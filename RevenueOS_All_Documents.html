&lt;!-- ⑤ EDGE CASES --&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-edge&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;Edge Cases &amp; Failure Modes&lt;/h2&gt;
    &lt;p&gt;The most important design decisions in an AI-native system are what happens when things go wrong. These are not rare scenarios — they are the normal reality of enterprise sales. Every edge case must have a defined resolution path.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;grid g2&quot; style=&quot;margin-bottom:16px&quot;&gt;
    &lt;div class=&quot;ec-card err&quot;&gt;
      &lt;div class=&quot;ec-title&quot;&gt;🚫 Agent Output Conflict&lt;/div&gt;
      &lt;div class=&quot;ec-body&quot;&gt;Discovery Agent extracts &quot;Budget: $200K&quot; from transcript. Qualification Agent captures &quot;Budget: $500K&quot; from manual rep input. Two conflicting signals in context graph.&lt;/div&gt;
      &lt;div class=&quot;ec-fix&quot;&gt;Resolution: &lt;span&gt;Orchestrator surfaces conflict to rep as task. Human resolves. Both values stored with source. Winning value tagged as &quot;confirmed&quot;.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ec-card warn&quot;&gt;
      &lt;div class=&quot;ec-title&quot;&gt;⚠️ Missing Economic Buyer — Gate Stuck&lt;/div&gt;
      &lt;div class=&quot;ec-body&quot;&gt;Deal has 5 stakeholders but none confirmed as Economic Buyer. Gate 1 blocks all progression. Rep cannot advance deal. Risk: deal stalls indefinitely.&lt;/div&gt;
      &lt;div class=&quot;ec-fix&quot;&gt;Resolution: &lt;span&gt;After 7 days, manager gets escalation alert. Manager can: grant 14-day gate override, assign task to rep, or downgrade deal forecast to &quot;At Risk&quot;.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ec-card err&quot;&gt;
      &lt;div class=&quot;ec-title&quot;&gt;🔇 Meeting Not Captured (Bot Blocked)&lt;/div&gt;
      &lt;div class=&quot;ec-body&quot;&gt;Customer&#x27;s IT policy blocks meeting bots (Google Meet, Teams). Recording not available. Discovery Agent cannot extract pain signals. Discovery report cannot be auto-generated.&lt;/div&gt;
      &lt;div class=&quot;ec-fix&quot;&gt;Resolution: &lt;span&gt;Agent detects no recording after meeting scheduled. Sends rep structured &quot;Meeting Intelligence Form&quot; — 10 fields — manual entry. Confidence score drops but flow continues.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ec-card warn&quot;&gt;
      &lt;div class=&quot;ec-title&quot;&gt;⚡ Assessment Skipped — Cold Qualification&lt;/div&gt;
      &lt;div class=&quot;ec-body&quot;&gt;Inbound call arrives. Assessment was never done. Qualification Agent needs maturity data but has none. Demo Agent has no pain categories. Proposal Agent has no risk data.&lt;/div&gt;
      &lt;div class=&quot;ec-fix&quot;&gt;Resolution: &lt;span&gt;Enrichment layer activates. Company domain → industry benchmarks used as proxy scores. All agent outputs tagged &quot;low confidence&quot;. Assessment triggered as async background task with incentive nudge.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ec-card info&quot;&gt;
      &lt;div class=&quot;ec-title&quot;&gt;🔄 Deal Regression — Stage Goes Backward&lt;/div&gt;
      &lt;div class=&quot;ec-body&quot;&gt;Contract in final stage. Customer&#x27;s procurement team changes. New stakeholder blocks legal. Deal must return to stakeholder mapping phase. All downstream data still valid but stage must regress.&lt;/div&gt;
      &lt;div class=&quot;ec-fix&quot;&gt;Resolution: &lt;span&gt;Stage regression allowed by manager only. Context preserved — no data deleted. Stakeholder Agent reactivates for new contact discovery. Forecast Agent updates probability down. Negotiation Agent re-evaluates commercial risk.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ec-card warn&quot;&gt;
      &lt;div class=&quot;ec-title&quot;&gt;📵 Integration Disconnected Mid-Deal&lt;/div&gt;
      &lt;div class=&quot;ec-body&quot;&gt;Google Calendar integration expires. Meetings stop being captured. Discovery Agent goes silent. 3 meetings pass without AI extraction. Context graph becomes stale.&lt;/div&gt;
      &lt;div class=&quot;ec-fix&quot;&gt;Resolution: &lt;span&gt;Integration health monitor detects gap. Alert sent to admin + rep within 24 hours. Manual meeting entry unlocked. Historical meetings re-synced automatically when reconnected.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ec-card info&quot;&gt;
      &lt;div class=&quot;ec-title&quot;&gt;🤖 AI Hallucination in Proposal&lt;/div&gt;
      &lt;div class=&quot;ec-body&quot;&gt;Proposal Agent generates an executive summary with an incorrect ROI figure — it hallucinated &quot;$2.4M savings&quot; with no supporting data in context graph.&lt;/div&gt;
      &lt;div class=&quot;ec-fix&quot;&gt;Resolution: &lt;span&gt;Every AI-generated claim is citation-tagged to source context. No claim without source is rendered — replaced with &quot;[Data needed]&quot;. Human review required before send. Confidence bar shown on each section.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ec-card err&quot;&gt;
      &lt;div class=&quot;ec-title&quot;&gt;🔐 Founder Touch Alert — 14 Days Overdue&lt;/div&gt;
      &lt;div class=&quot;ec-body&quot;&gt;Strategic account ($1M+ deal). Founder has not had executive interaction in 18 days. Gate 5 trigger: deal should be paused or escalated. Sales rep unaware of alert.&lt;/div&gt;
      &lt;div class=&quot;ec-fix&quot;&gt;Resolution: &lt;span&gt;Executive Agent fires internal alert: in-app notification + email alert to founder. Deal flagged &quot;Executive Touch Overdue&quot; in Command Center. Auto-drafted follow-up email generated for founder to send directly from their email client via the Gmail/Outlook integration.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ec-card ok&quot;&gt;
      &lt;div class=&quot;ec-title&quot;&gt;✓ Duplicate Company Detection&lt;/div&gt;
      &lt;div class=&quot;ec-body&quot;&gt;Two reps create separate deals for the same company — one from inbound, one from assessment. Context graph would be split across two deal records causing duplicate AI work.&lt;/div&gt;
      &lt;div class=&quot;ec-fix&quot;&gt;Resolution: &lt;span&gt;Company deduplication runs on domain + LinkedIn URL. Duplicate flagged within 1 hour. Admin merges or separates. Context graphs merged intelligently — newer data wins, older data archived as history.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ec-card warn&quot;&gt;
      &lt;div class=&quot;ec-title&quot;&gt;📊 Overfit Qualification Score&lt;/div&gt;
      &lt;div class=&quot;ec-body&quot;&gt;Qualification Agent gives deal a high score because rep manually entered all &quot;correct&quot; answers to MEDDIC without real evidence. Context graph has no corroborating signals.&lt;/div&gt;
      &lt;div class=&quot;ec-fix&quot;&gt;Resolution: &lt;span&gt;Validation layer cross-checks manual entries against transcript signals. Unverified claims flagged as &quot;Rep-stated only&quot;. Forecast Agent applies discount to win probability for uncorroborated fields. Manager alerted.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;🛡️&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;AI Guardrail System&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;Five layers of protection to prevent bad AI outputs from damaging real deals&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;grid g3&quot; style=&quot;margin-top:8px&quot;&gt;
      &lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px&quot;&gt;
        &lt;div style=&quot;font-size:10px;font-weight:700;color:#7c3aed;margin-bottom:6px&quot;&gt;LAYER 1 — CITATION LOCK&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#475569;line-height:1.6&quot;&gt;Every AI output must cite its source context node. If no context exists for a claim, the claim is blocked or marked &quot;[Needs verification]&quot;.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px&quot;&gt;
        &lt;div style=&quot;font-size:10px;font-weight:700;color:#7c3aed;margin-bottom:6px&quot;&gt;LAYER 2 — CONFIDENCE THRESHOLD&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#475569;line-height:1.6&quot;&gt;Proposals, demo scripts, and negotiation strategies are only auto-applied if confidence score &amp;gt; 65%. Below that, output is surfaced as &quot;Draft — Review Required&quot;.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px&quot;&gt;
        &lt;div style=&quot;font-size:10px;font-weight:700;color:#7c3aed;margin-bottom:6px&quot;&gt;LAYER 3 — HUMAN GATE FOR HIGH-STAKES&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#475569;line-height:1.6&quot;&gt;No proposal leaves the system without human approval. No contract is signed without e-signature. No forecast commits without manager confirmation.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px&quot;&gt;
        &lt;div style=&quot;font-size:10px;font-weight:700;color:#7c3aed;margin-bottom:6px&quot;&gt;LAYER 4 — AGENT AUDIT LOG&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#475569;line-height:1.6&quot;&gt;Every agent invocation logged: inputs consumed, outputs produced, confidence score, time taken, human acceptance/rejection decision. Used for model fine-tuning.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px&quot;&gt;
        &lt;div style=&quot;font-size:10px;font-weight:700;color:#7c3aed;margin-bottom:6px&quot;&gt;LAYER 5 — DRIFT DETECTION&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#475569;line-height:1.6&quot;&gt;If an agent&#x27;s outputs are consistently rejected by humans in a specific category, drift alert fires. AI model recalibration triggered. Admin notified.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ⑥ CLIENT CONFIG --&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-config&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;Client Configuration System&lt;/h2&gt;
    &lt;p&gt;Every client using RevenueOS has a unique configuration. The client admin controls which modules are active, which gates are mandatory, which AI agents fire, and how strict governance is. This is not a settings page — it is a full workflow engine configuration.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot; style=&quot;margin-bottom:20px&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;⚙️&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Client Config Schema (JSON)&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;Stored per client_id — drives every agent and gate decision&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;cfg&quot;&gt;
&lt;span class=&quot;c&quot;&gt;// client_config.json — loaded by Orchestration Agent on every deal event&lt;/span&gt;&lt;br&gt;
{&lt;br&gt;
&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;client_id&quot;&lt;/span&gt;: &lt;span class=&quot;s&quot;&gt;&quot;BeeForce_IN_001&quot;&lt;/span&gt;,&lt;br&gt;
&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;org_name&quot;&lt;/span&gt;: &lt;span class=&quot;s&quot;&gt;&quot;Acme Corp Sales&quot;&lt;/span&gt;,&lt;br&gt;
&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;qualification_framework&quot;&lt;/span&gt;: &lt;span class=&quot;s&quot;&gt;&quot;MEDDIC&quot;&lt;/span&gt;, &lt;span class=&quot;c&quot;&gt;// or BANT, SPICED, CUSTOM&lt;/span&gt;&lt;br&gt;
&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;active_modules&quot;&lt;/span&gt;: [&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;s&quot;&gt;&quot;assessment&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;lead_scoring&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;stakeholder_matrix&quot;&lt;/span&gt;,&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;s&quot;&gt;&quot;qualification&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;discovery&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;demo&quot;&lt;/span&gt;,&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;s&quot;&gt;&quot;proposal&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;negotiation&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;forecasting&quot;&lt;/span&gt;&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;c&quot;&gt;// &quot;executive_rm&quot; — NOT enabled (no founder access configured)&lt;/span&gt;&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;c&quot;&gt;// &quot;demo_coach&quot; — NOT enabled (no LMS connected)&lt;/span&gt;&lt;br&gt;
&amp;nbsp;&amp;nbsp;],&lt;br&gt;
&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;gates&quot;&lt;/span&gt;: {&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;gate_1_qualification&quot;&lt;/span&gt;: { &lt;span class=&quot;k&quot;&gt;&quot;enabled&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;true&lt;/span&gt;, &lt;span class=&quot;k&quot;&gt;&quot;strict&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;true&lt;/span&gt;, &lt;span class=&quot;k&quot;&gt;&quot;override_role&quot;&lt;/span&gt;: &lt;span class=&quot;s&quot;&gt;&quot;manager&quot;&lt;/span&gt; },&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;gate_4_stakeholders&quot;&lt;/span&gt;: { &lt;span class=&quot;k&quot;&gt;&quot;enabled&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;true&lt;/span&gt;, &lt;span class=&quot;k&quot;&gt;&quot;min_count&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;3&lt;/span&gt;, &lt;span class=&quot;k&quot;&gt;&quot;strict&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;false&lt;/span&gt; }, &lt;span class=&quot;c&quot;&gt;// relaxed to 3&lt;/span&gt;&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;gate_7_discovery&quot;&lt;/span&gt;: { &lt;span class=&quot;k&quot;&gt;&quot;enabled&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;true&lt;/span&gt;, &lt;span class=&quot;k&quot;&gt;&quot;strict&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;true&lt;/span&gt;, &lt;span class=&quot;k&quot;&gt;&quot;override_role&quot;&lt;/span&gt;: &lt;span class=&quot;s&quot;&gt;&quot;admin&quot;&lt;/span&gt; },&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;gate_8_demo_score&quot;&lt;/span&gt;: { &lt;span class=&quot;k&quot;&gt;&quot;enabled&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;false&lt;/span&gt; }, &lt;span class=&quot;c&quot;&gt;// disabled — no LMS&lt;/span&gt;&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;gate_2_exec_sponsor&quot;&lt;/span&gt;: { &lt;span class=&quot;k&quot;&gt;&quot;enabled&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;true&lt;/span&gt;, &lt;span class=&quot;k&quot;&gt;&quot;strict&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;true&lt;/span&gt;, &lt;span class=&quot;k&quot;&gt;&quot;override_role&quot;&lt;/span&gt;: &lt;span class=&quot;s&quot;&gt;&quot;admin&quot;&lt;/span&gt; }&lt;br&gt;
&amp;nbsp;&amp;nbsp;},&lt;br&gt;
&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;active_agents&quot;&lt;/span&gt;: [&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;s&quot;&gt;&quot;assessment_agent&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;qualification_agent&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;discovery_agent&quot;&lt;/span&gt;,&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;s&quot;&gt;&quot;stakeholder_agent&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;demo_agent&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;proposal_agent&quot;&lt;/span&gt;,&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;s&quot;&gt;&quot;negotiation_agent&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;forecast_agent&quot;&lt;/span&gt;&lt;br&gt;
&amp;nbsp;&amp;nbsp;],&lt;br&gt;
&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;integrations&quot;&lt;/span&gt;: {&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;email&quot;&lt;/span&gt;: &lt;span class=&quot;s&quot;&gt;&quot;gmail&quot;&lt;/span&gt;, &lt;span class=&quot;k&quot;&gt;&quot;calendar&quot;&lt;/span&gt;: &lt;span class=&quot;s&quot;&gt;&quot;google_calendar&quot;&lt;/span&gt;,&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;video&quot;&lt;/span&gt;: [&lt;span class=&quot;s&quot;&gt;&quot;google_meet&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;zoom&quot;&lt;/span&gt;],&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;esign&quot;&lt;/span&gt;: &lt;span class=&quot;s&quot;&gt;&quot;docusign&quot;&lt;/span&gt;, &lt;span class=&quot;k&quot;&gt;&quot;erp&quot;&lt;/span&gt;: &lt;span class=&quot;s&quot;&gt;&quot;sap&quot;&lt;/span&gt;, &lt;span class=&quot;k&quot;&gt;&quot;lms&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;null&lt;/span&gt;&lt;br&gt;
&amp;nbsp;&amp;nbsp;},&lt;br&gt;
&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;entry_point_config&quot;&lt;/span&gt;: {&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;assessment_required&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;false&lt;/span&gt;, &lt;span class=&quot;c&quot;&gt;// allow cold start&lt;/span&gt;&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;cold_start_confidence_floor&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;35&lt;/span&gt;, &lt;span class=&quot;c&quot;&gt;// min to create deal&lt;/span&gt;&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;enrichment_provider&quot;&lt;/span&gt;: &lt;span class=&quot;s&quot;&gt;&quot;clearbit&quot;&lt;/span&gt;,&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;allowed_entry_points&quot;&lt;/span&gt;: [&lt;span class=&quot;s&quot;&gt;&quot;assessment&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;inbound_call&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;email&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;referral&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;linkedin&quot;&lt;/span&gt;]&lt;br&gt;
&amp;nbsp;&amp;nbsp;},&lt;br&gt;
&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;role_config&quot;&lt;/span&gt;: {&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;gate_override&quot;&lt;/span&gt;: [&lt;span class=&quot;s&quot;&gt;&quot;admin&quot;&lt;/span&gt;, &lt;span class=&quot;s&quot;&gt;&quot;manager&quot;&lt;/span&gt;],&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;proposal_approval_required&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;true&lt;/span&gt;,&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;cross_rep_visibility&quot;&lt;/span&gt;: &lt;span class=&quot;s&quot;&gt;&quot;manager_and_above&quot;&lt;/span&gt;,&lt;br&gt;
&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;span class=&quot;k&quot;&gt;&quot;founder_mode_enabled&quot;&lt;/span&gt;: &lt;span class=&quot;v&quot;&gt;false&lt;/span&gt;&lt;br&gt;
&amp;nbsp;&amp;nbsp;}&lt;br&gt;
}
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;grid g2&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#f0fdf4;color:#16a34a&quot;&gt;✅&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;What Client Admin CAN Configure&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Toggle modules on/off (demo coach, executive RM, forecast)&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Set gate strictness: strict, warning-only, or disabled&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Choose qualification framework (BANT / MEDDIC / SPICED)&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Set minimum stakeholder count (default 4, min 2)&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Configure which entry points are valid for new deal creation&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Map integration credentials per tool&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Set role permissions and override hierarchy&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Configure assessment category weights per industry&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#fff5f5;color:#dc2626&quot;&gt;🔒&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;What Client Admin CANNOT Configure&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-red&quot;&gt;&lt;/div&gt;Cannot disable all gates simultaneously (minimum 1 gate enforced)&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-red&quot;&gt;&lt;/div&gt;Cannot remove human approval on external documents (proposals, contracts)&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-red&quot;&gt;&lt;/div&gt;Cannot grant sales reps cross-team deal visibility&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-red&quot;&gt;&lt;/div&gt;Cannot disable agent audit logging&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-red&quot;&gt;&lt;/div&gt;Cannot modify AI models or prompts (Super Admin only)&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-red&quot;&gt;&lt;/div&gt;Cannot delete deal context history (append-only)&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-red&quot;&gt;&lt;/div&gt;Cannot disable data encryption in transit or at rest&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ⑦ SCREEN ARCHITECTURE --&gt;

  &lt;div class=&quot;card&quot; style=&quot;margin-bottom:20px;border-left:4px solid #7c3aed&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;🚀&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Agent Activation by Phase&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;Not all agents are active from Day 1&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;grid g3&quot; style=&quot;margin-top:8px&quot;&gt;
      &lt;div style=&quot;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px&quot;&gt;
        &lt;div style=&quot;font-size:11px;font-weight:800;color:#15803d;margin-bottom:6px&quot;&gt;PHASE 1 — M1–3 (Foundation)&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#475569;line-height:1.7&quot;&gt;&lt;strong&gt;Active agents: 2 only&lt;/strong&gt;&lt;br&gt;✅ Email Intelligence Agent&lt;br&gt;✅ Assessment Agent&lt;br&gt;&lt;span style=&quot;color:#94a3b8&quot;&gt;All other 8 agents inactive&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:14px&quot;&gt;
        &lt;div style=&quot;font-size:11px;font-weight:800;color:#1d4ed8;margin-bottom:6px&quot;&gt;PHASE 2 — M4–6 (Intelligence)&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#475569;line-height:1.7&quot;&gt;&lt;strong&gt;All 10 agents active&lt;/strong&gt;&lt;br&gt;✅ Qualification, Discovery, Stakeholder&lt;br&gt;✅ Demo, Proposal, Negotiation&lt;br&gt;✅ Forecast, Executive agents enabled&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:14px&quot;&gt;
        &lt;div style=&quot;font-size:11px;font-weight:800;color:#c2410c;margin-bottom:6px&quot;&gt;PHASE 3 — M7–12 (Scale)&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#475569;line-height:1.7&quot;&gt;&lt;strong&gt;Executive Command Center&lt;/strong&gt;&lt;br&gt;📱 Mobile app&lt;br&gt;🔗 ERP integrations (SAP/Oracle)&lt;br&gt;🌐 Multi-region deployment&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-screens&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;Screen Architecture&lt;/h2&gt;
    &lt;p&gt;Screens are not page views — they are context-aware surfaces that render dynamically based on deal state, user role, and AI agent outputs. The same &quot;Proposal screen&quot; renders differently for a rep vs a manager vs a founder.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;grid g2&quot; style=&quot;margin-bottom:20px&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;📱&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Screen Types&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot&quot;&gt;&lt;/div&gt;&lt;b&gt;Execution Screens&lt;/b&gt; — rep takes action (assessment wizard, MAP builder, demo script player)&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot&quot;&gt;&lt;/div&gt;&lt;b&gt;Intelligence Screens&lt;/b&gt; — AI surfaces insights (pain heatmap, win probability, negotiation radar)&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot&quot;&gt;&lt;/div&gt;&lt;b&gt;Governance Screens&lt;/b&gt; — gate status, qualification completeness, blocker log&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot&quot;&gt;&lt;/div&gt;&lt;b&gt;Output Screens&lt;/b&gt; — generated documents (proposal preview, discovery report, coaching report)&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot&quot;&gt;&lt;/div&gt;&lt;b&gt;Command Screens&lt;/b&gt; — founder/manager dashboards, forecast, executive relationships&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#f0fdf4;color:#16a34a&quot;&gt;🎨&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Screen State Model&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;&lt;b&gt;Locked&lt;/b&gt; — preceding gate not passed, screen greyed out with reason&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-warn&quot;&gt;&lt;/div&gt;&lt;b&gt;Active / In Progress&lt;/b&gt; — current stage screen, rep actively using&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot&quot;&gt;&lt;/div&gt;&lt;b&gt;AI Populated&lt;/b&gt; — fields auto-filled by agent, human must review&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;&lt;b&gt;Completed&lt;/b&gt; — human confirmed, locked for editing&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-red&quot;&gt;&lt;/div&gt;&lt;b&gt;Needs Attention&lt;/b&gt; — AI flagged issue or missing data&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#eff6ff;color:#2563eb&quot;&gt;🏗️&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Screen Composition Pattern&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;Every screen in RevenueOS is composed from 4 layers&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;arch&quot; style=&quot;margin-top:12px&quot;&gt;
      &lt;div class=&quot;arch-layer&quot;&gt;
        &lt;div class=&quot;al-label&quot;&gt;DATA LAYER&lt;/div&gt;
        &lt;div class=&quot;al-items&quot;&gt;
          &lt;div class=&quot;al-item&quot;&gt;📊 Deal Context Graph&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;🤖 Agent Output Cache&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;🔗 Live Integration Data&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;👤 User Role &amp; Permissions&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;⚙️ Client Config&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arch-layer&quot;&gt;
        &lt;div class=&quot;al-label&quot;&gt;BUSINESS LAYER&lt;/div&gt;
        &lt;div class=&quot;al-items&quot;&gt;
          &lt;div class=&quot;al-item&quot;&gt;🔒 Gate Status Check&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;📋 Stage Completion %&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;📈 Confidence Score&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;⚠️ Blocker Detection&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;🎯 Action Recommendations&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arch-layer&quot;&gt;
        &lt;div class=&quot;al-label&quot;&gt;RENDER LAYER&lt;/div&gt;
        &lt;div class=&quot;al-items&quot;&gt;
          &lt;div class=&quot;al-item&quot;&gt;🧩 Component Registry&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;🎨 Role-based UI variant&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;📝 AI-populated fields highlighted&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;🔐 Field-level permission masking&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;📲 Responsive layout engine&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arch-layer&quot;&gt;
        &lt;div class=&quot;al-label&quot;&gt;INTERACTION LAYER&lt;/div&gt;
        &lt;div class=&quot;al-items&quot;&gt;
          &lt;div class=&quot;al-item&quot;&gt;✏️ Human edits → context write&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;✅ Confirmations → gate signals&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;🚩 Flag / Override controls&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;💬 Inline AI chat per screen&lt;/div&gt;
          &lt;div class=&quot;al-item&quot;&gt;📤 Export / Share actions&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot; style=&quot;margin-top:20px;border-left:4px solid #10b981&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#ecfdf5;color:#047857&quot;&gt;🤝&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;CS Handover Screens&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;Post-win persona — 6 dedicated screens, all deal stages read-only&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;grid g3&quot; style=&quot;margin-top:10px&quot;&gt;
      &lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:13px&quot;&gt;&lt;div style=&quot;font-size:11px;font-weight:700;color:#047857;margin-bottom:4px&quot;&gt;🏆 Won Deals Queue&lt;/div&gt;&lt;div style=&quot;font-size:10px;color:#64748b&quot;&gt;Filtered pipeline view showing all recently won deals awaiting CS assignment. Priority sorted by go-live date.&lt;/div&gt;&lt;/div&gt;
      &lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:13px&quot;&gt;&lt;div style=&quot;font-size:11px;font-weight:700;color:#047857;margin-bottom:4px&quot;&gt;📋 Deal Summary (read-only)&lt;/div&gt;&lt;div style=&quot;font-size:10px;color:#64748b&quot;&gt;Full deal context — pain points, assessment scores, qualification data. Commercial pricing hidden. Read-only for CS persona.&lt;/div&gt;&lt;/div&gt;
      &lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:13px&quot;&gt;&lt;div style=&quot;font-size:11px;font-weight:700;color:#047857;margin-bottom:4px&quot;&gt;🗺️ Stakeholder Map (read-only)&lt;/div&gt;&lt;div style=&quot;font-size:10px;color:#64748b&quot;&gt;Full stakeholder power map with roles, sentiment, and contact history. Critical for CS to understand the people landscape.&lt;/div&gt;&lt;/div&gt;
      &lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:13px&quot;&gt;&lt;div style=&quot;font-size:11px;font-weight:700;color:#047857;margin-bottom:4px&quot;&gt;📄 AI Handover Document&lt;/div&gt;&lt;div style=&quot;font-size:10px;color:#64748b&quot;&gt;Auto-generated handover doc pulling from all deal context. Covers pain, solution sold, stakeholder map, commitments made. Export as PDF or send via email.&lt;/div&gt;&lt;/div&gt;
      &lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:13px&quot;&gt;&lt;div style=&quot;font-size:11px;font-weight:700;color:#047857;margin-bottom:4px&quot;&gt;🗂️ Onboarding Plan Builder&lt;/div&gt;&lt;div style=&quot;font-size:10px;color:#64748b&quot;&gt;30/60/90 day onboarding plan with milestones, owner assignments, and success KPIs. AI pre-populates from deal commitments.&lt;/div&gt;&lt;/div&gt;
      &lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:13px&quot;&gt;&lt;div style=&quot;font-size:11px;font-weight:700;color:#047857;margin-bottom:4px&quot;&gt;📧 Handoff Email Draft&lt;/div&gt;&lt;div style=&quot;font-size:10px;color:#64748b&quot;&gt;AI-drafted introduction email from Sales Rep to CS team and client stakeholders. Sent via Gmail/Outlook only — no external portal links.&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div style=&quot;margin-top:12px;background:#ecfdf5;border:1px solid #6ee7b7;border-radius:8px;padding:10px;font-size:10px;color:#065f46&quot;&gt;&lt;strong&gt;Internal tool only.&lt;/strong&gt; CS Handover persona cannot share deal links externally. All client communication via email (Gmail/Outlook) only.&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ⑧ TECH STACK --&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-infra&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;Tech Stack &amp; Infrastructure&lt;/h2&gt;
    &lt;p&gt;The infrastructure must support real-time agent orchestration, context versioning, event streaming, multi-tenant isolation, and sub-second screen rendering. This is not a CRUD app — it is an event-driven AI platform.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;arch&quot; style=&quot;margin-bottom:24px&quot;&gt;
    &lt;div class=&quot;arch-layer&quot; style=&quot;border-left:3px solid #7c3aed&quot;&gt;
      &lt;div class=&quot;al-label&quot; style=&quot;color:#7c3aed&quot;&gt;AI / AGENTS&lt;/div&gt;
      &lt;div class=&quot;al-items&quot;&gt;
        &lt;div class=&quot;al-item&quot;&gt;🧠 LLM: Claude 3.5 (Orchestrator)&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🔄 Agent SDK: LangGraph / CrewAI&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;📚 RAG: Pinecone (deal context vectors)&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🔍 Enrichment: Clearbit / Clay&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🎙️ Transcription: Deepgram / Whisper&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;📄 Doc Gen: Custom LLM pipeline&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;arch-layer&quot; style=&quot;border-left:3px solid #2563eb&quot;&gt;
      &lt;div class=&quot;al-label&quot; style=&quot;color:#2563eb&quot;&gt;BACKEND&lt;/div&gt;
      &lt;div class=&quot;al-items&quot;&gt;
        &lt;div class=&quot;al-item&quot;&gt;⚙️ API: Next.js / FastAPI&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;📨 Events: Kafka / Redis Streams&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🔔 Realtime: Supabase / Pusher&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🔀 Queue: BullMQ (agent tasks)&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🔐 Auth: Supabase Auth + RLS&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🧩 Webhooks: Integration gateway&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;arch-layer&quot; style=&quot;border-left:3px solid #0891b2&quot;&gt;
      &lt;div class=&quot;al-label&quot; style=&quot;color:#0891b2&quot;&gt;DATABASE&lt;/div&gt;
      &lt;div class=&quot;al-items&quot;&gt;
        &lt;div class=&quot;al-item&quot;&gt;📊 Primary: PostgreSQL (Supabase)&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;⚡ Cache: Redis (agent outputs)&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🔍 Search: Typesense / PG full-text&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;📈 Timeseries: ClickHouse (analytics)&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;📎 Files: Supabase Storage / S3&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🧠 Vectors: pgvector + Pinecone&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;arch-layer&quot; style=&quot;border-left:3px solid #16a34a&quot;&gt;
      &lt;div class=&quot;al-label&quot; style=&quot;color:#16a34a&quot;&gt;FRONTEND&lt;/div&gt;
      &lt;div class=&quot;al-items&quot;&gt;
        &lt;div class=&quot;al-item&quot;&gt;⚛️ Framework: Next.js 15 App Router&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🎨 UI: Tailwind + shadcn/ui&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;📊 Charts: Recharts / Tremor&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🔄 State: Zustand + React Query&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;📡 Realtime: Supabase subscriptions&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;✍️ Rich text: TipTap (proposal editor)&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;arch-layer&quot; style=&quot;border-left:3px solid #ea580c&quot;&gt;
      &lt;div class=&quot;al-label&quot; style=&quot;color:#ea580c&quot;&gt;INTEGRATIONS&lt;/div&gt;
      &lt;div class=&quot;al-items&quot;&gt;
        &lt;div class=&quot;al-item&quot;&gt;📧 Gmail / Outlook API&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;📅 Google Calendar / Teams&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🎥 Zoom / Meet webhooks&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;📧 Email (ONLY external channel — Gmail/Outlook)&lt;/div&gt;
        &lt;div class=&quot;al-item&quot; style=&quot;font-size:9px;color:#94a3b8;padding-left:4px&quot;&gt;⚠ No WhatsApp/LinkedIn outbound. LinkedIn = enrichment API only.&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;✍️ DocuSign / Adobe Sign&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🔗 ERP: SAP / Oracle via MCP&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;arch-layer&quot; style=&quot;border-left:3px solid #f59e0b&quot;&gt;
      &lt;div class=&quot;al-label&quot; style=&quot;color:#b45309&quot;&gt;INFRA / OPS&lt;/div&gt;
      &lt;div class=&quot;al-items&quot;&gt;
        &lt;div class=&quot;al-item&quot;&gt;☁️ Cloud: Vercel + AWS&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🐳 Agents: Docker + ECS&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🔒 Security: SOC2 compliant&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;📊 Observability: Datadog / Sentry&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🏠 Multi-tenant: Row-level security&lt;/div&gt;
        &lt;div class=&quot;al-item&quot;&gt;🔑 Secrets: AWS Secrets Manager&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;🔑&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;3 Non-Negotiable Architecture Principles&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;grid g3&quot; style=&quot;margin-top:8px&quot;&gt;
      &lt;div style=&quot;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:16px&quot;&gt;
        &lt;div style=&quot;font-size:13px;font-weight:800;color:#15803d;margin-bottom:8px&quot;&gt;1. Context is King&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#475569;line-height:1.7&quot;&gt;Every agent output, human input, integration event, and deal signal is persisted in a versioned, append-only context graph. Nothing is ever deleted. Every decision can be explained by tracing context history.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:16px&quot;&gt;
        &lt;div style=&quot;font-size:13px;font-weight:800;color:#1d4ed8;margin-bottom:8px&quot;&gt;2. Agents Assist, Humans Decide&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#475569;line-height:1.7&quot;&gt;No agent takes a high-stakes action autonomously. Proposals, contracts, emails to customers, gate overrides — all require explicit human confirmation. AI surfaces, recommends, and drafts. Humans approve and act.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:16px&quot;&gt;
        &lt;div style=&quot;font-size:13px;font-weight:800;color:#c2410c;margin-bottom:8px&quot;&gt;3. Every Client Gets Their Flow&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#475569;line-height:1.7&quot;&gt;No two client deployments are identical. Module activation, gate strictness, role permissions, entry points, qualification frameworks — all per-client config. The platform is one engine; the config is the product.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;/div&gt;&lt;!-- /page --&gt;

&lt;script&gt;
function showTab(id) {
  document.querySelectorAll(&#x27;.tab&#x27;).forEach(t =&gt; t.classList.remove(&#x27;active&#x27;));
  document.querySelectorAll(&#x27;.sec&#x27;).forEach(s =&gt; s.classList.remove(&#x27;active&#x27;));

  groups.push({g:&#x27;Integrations&#x27;,items:[{i:&#x27;🔗&#x27;,name:&#x27;Connected Platforms&#x27;,t:&#x27;14 live integrations&#x27;},{i:&#x27;📤&#x27;,name:&#x27;Export Options&#x27;,t:&#x27;PDF · CSV · API&#x27;}]});

  let firstMi=null;
  groups.forEach((grp,gi)=&gt;{
    const gl=document.createElement(&#x27;div&#x27;);gl.className=&#x27;mn-group&#x27;;gl.textContent=grp.g;navList.appendChild(gl);
    grp.items.forEach((item,ii)=&gt;{
      const mi=document.createElement(&#x27;div&#x27;);mi.className=&#x27;mn-item&#x27;;
      mi.innerHTML=`&lt;span class=&quot;mn-icon&quot;&gt;${item.i}&lt;/span&gt;&lt;span&gt;${item.name}&lt;/span&gt;`;
      if(gi===0&amp;&amp;ii===0){mi.classList.add(&#x27;active&#x27;);firstMi=mi;}
      mi.addEventListener(&#x27;click&#x27;,()=&gt;{
        navList.querySelectorAll(&#x27;.mn-item&#x27;).forEach(x=&gt;x.classList.remove(&#x27;active&#x27;));
        mi.classList.add(&#x27;active&#x27;);
        renderStageBody(n,gi,ii,groups);
      });
      navList.appendChild(mi);
    });
  });
  renderStageBody(n,0,0,groups);
}

function renderStageBody(n,gi,ii,groups){
  const body=document.getElementById(&#x27;mbody&#x27;);body.innerHTML=&#x27;&#x27;;
  const ph=PH[n.phase]||PH.entry;
  const grp=groups[gi];
  const sc={done:&#x27;#16a34a&#x27;,progress:&#x27;#2563eb&#x27;,none:&#x27;#94a3b8&#x27;}[n.status||&#x27;none&#x27;];
  const sl={done:&#x27;Completed&#x27;,progress:&#x27;In Progress&#x27;,none:&#x27;Not Started&#x27;}[n.status||&#x27;none&#x27;];

  if(gi===0){ // Overview
    body.innerHTML=`
     &lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:11px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px&quot;&gt;
      &lt;div style=&quot;width:10px;height:10px;border-radius:50%;background:${sc};box-shadow:0 0 0 3px ${sc}20;flex-shrink:0&quot;&gt;&lt;/div&gt;
      &lt;div&gt;&lt;div style=&quot;font-size:9px;font-weight:700;letter-spacing:.7px;color:#94a3b8;text-transform:uppercase;margin-bottom:2px&quot;&gt;Stage Status&lt;/div&gt;&lt;div style=&quot;font-size:13px;font-weight:700;color:${sc}&quot;&gt;${sl}&lt;/div&gt;&lt;/div&gt;
     &lt;/div&gt;
     &lt;div class=&quot;ms-title&quot;&gt;DESCRIPTION&lt;/div&gt;
     &lt;div style=&quot;font-size:12px;color:#475569;line-height:1.75;padding:12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:14px&quot;&gt;${n.desc}&lt;/div&gt;
     &lt;div class=&quot;ms-title&quot;&gt;KEY CAPABILITIES&lt;/div&gt;
     ${n.bullets.map(b=&gt;`&lt;div style=&quot;display:flex;gap:9px;padding:7px 0;border-bottom:1px solid #f8fafc;font-size:12px;color:#475569;align-items:flex-start&quot;&gt;&lt;span style=&quot;color:${ph.color};font-size:11px;margin-top:1px;flex-shrink:0&quot;&gt;✓&lt;/span&gt;${b}&lt;/div&gt;`).join(&#x27;&#x27;)}`;
  } else if(grp.g===&#x27;Screens &amp; Features&#x27;){
    body.innerHTML=`&lt;div class=&quot;ms-title&quot;&gt;SCREENS &amp; FEATURES (${n.screens.length})&lt;/div&gt;`;
    n.screens.forEach(s=&gt;{
      const row=document.createElement(&#x27;div&#x27;);row.className=&#x27;scr-row&#x27;;
      row.innerHTML=`&lt;span class=&quot;sr-icon&quot;&gt;${s.i}&lt;/span&gt;&lt;div&gt;&lt;div class=&quot;sr-name&quot;&gt;${s.n}&lt;/div&gt;&lt;div class=&quot;sr-tag&quot;&gt;${s.t}&lt;/div&gt;&lt;/div&gt;&lt;span class=&quot;sr-arr&quot;&gt;›&lt;/span&gt;`;
      body.appendChild(row);
    });
  } else if(grp.g===&#x27;AI Agent&#x27;){
    body.innerHTML=`&lt;div class=&quot;ms-title&quot;&gt;AI AGENT&lt;/div&gt;&lt;div class=&quot;ai-box&quot;&gt;&lt;div class=&quot;ai-head&quot;&gt;&lt;span class=&quot;ai-badge&quot;&gt;AI AGENT&lt;/span&gt;&lt;span class=&quot;ai-name&quot;&gt;${n.ai}&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;ai-feat&quot;&gt;Activates automatically at this pipeline stage&lt;/div&gt;&lt;div class=&quot;ai-feat&quot;&gt;Analyses all deal data and interactions in real time&lt;/div&gt;&lt;div class=&quot;ai-feat&quot;&gt;Surfaces actionable recommendations proactively&lt;/div&gt;&lt;div class=&quot;ai-feat&quot;&gt;No manual trigger or input required&lt;/div&gt;&lt;div class=&quot;ai-feat&quot;&gt;Connected to all 14 integrations simultaneously&lt;/div&gt;&lt;/div&gt;`;
  } else {
    body.innerHTML=`&lt;div class=&quot;ms-title&quot;&gt;CONNECTED PLATFORMS&lt;/div&gt;${[&#x27;Gmail / Outlook (email — only external channel)&#x27;,&#x27;Google Calendar / Teams (scheduling)&#x27;,&#x27;Zoom / Google Meet (transcription)&#x27;,&#x27;LinkedIn API (enrichment only — no outbound)&#x27;,&#x27;DocuSign / Adobe Sign (e-signature)&#x27;,&#x27;BeeForce / WrkVybe (platform)&#x27;,&#x27;LMS (coaching)&#x27;,&#x27;ERP (Phase 3)&#x27;].map(p=&gt;`&lt;div class=&quot;scr-row&quot;&gt;&lt;span class=&quot;sr-icon&quot;&gt;🔗&lt;/span&gt;&lt;div&gt;&lt;div class=&quot;sr-name&quot;&gt;${p}&lt;/div&gt;&lt;div class=&quot;sr-tag&quot;&gt;Live data sync&lt;/div&gt;&lt;/div&gt;&lt;span style=&quot;font-size:9px;font-weight:700;background:#dcfce7;color:#15803d;padding:2px 7px;border-radius:8px;border:1px solid #86efac&quot;&gt;Active&lt;/span&gt;&lt;/div&gt;`).join(&#x27;&#x27;)}`;
  }
}

function buildGateNav(n){
  const navList=document.getElementById(&#x27;navList&#x27;);navList.innerHTML=&#x27;&#x27;;
  const items=[{i:&#x27;🔒&#x27;,name:&#x27;Gate Rule&#x27;},{i:&#x27;✅&#x27;,name:&#x27;YES — Proceed&#x27;},{i:&#x27;❌&#x27;,name:&#x27;NO — Blocked&#x27;},{i:&#x27;📊&#x27;,name:&#x27;Pass Rate&#x27;}];
  items.forEach((item,ii)=&gt;{
    const mi=document.createElement(&#x27;div&#x27;);mi.className=&#x27;mn-item&#x27;;
    mi.innerHTML=`&lt;span class=&quot;mn-icon&quot;&gt;${item.i}&lt;/span&gt;&lt;span&gt;${item.name}&lt;/span&gt;`;
    if(ii===0)mi.classList.add(&#x27;active&#x27;);
    mi.addEventListener(&#x27;click&#x27;,()=&gt;{navList.querySelectorAll(&#x27;.mn-item&#x27;).forEach(x=&gt;x.classList.remove(&#x27;active&#x27;));mi.classList.add(&#x27;active&#x27;);renderGateBody(n,ii)});
    navList.appendChild(mi);
  });
  renderGateBody(n,0);
}

function renderGateBody(n,idx){
  const body=document.getElementById(&#x27;mbody&#x27;);body.innerHTML=&#x27;&#x27;;
  if(idx===0){
    body.innerHTML=`&lt;div class=&quot;ms-title&quot;&gt;GATE CONDITION&lt;/div&gt;&lt;div class=&quot;gate-box&quot;&gt;&lt;div class=&quot;gb-head&quot;&gt;🔒 Governance Rule&lt;/div&gt;&lt;div class=&quot;gb-rule&quot;&gt;${n.rule}&lt;/div&gt;&lt;div class=&quot;gb-paths&quot;&gt;&lt;div class=&quot;gb-yes&quot;&gt;&lt;div class=&quot;gb-lbl&quot; style=&quot;color:#16a34a&quot;&gt;✓ YES — Proceed&lt;/div&gt;&lt;div class=&quot;gb-val&quot; style=&quot;color:#14532d&quot;&gt;${n.yes}&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;gb-no&quot;&gt;&lt;div class=&quot;gb-lbl&quot; style=&quot;color:#dc2626&quot;&gt;✗ NO — Blocked&lt;/div&gt;&lt;div class=&quot;gb-val&quot; style=&quot;color:#7f1d1d&quot;&gt;${n.no}&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;`;
  } else if(idx===1){
    body.innerHTML=`&lt;div class=&quot;ms-title&quot;&gt;YES PATH&lt;/div&gt;&lt;div class=&quot;gate-box&quot; style=&quot;background:#f0fdf4;border-color:#86efac&quot;&gt;&lt;div class=&quot;gb-head&quot; style=&quot;color:#15803d&quot;&gt;✓ Gate Passed&lt;/div&gt;&lt;div class=&quot;gb-rule&quot; style=&quot;color:#14532d&quot;&gt;${n.yes}&lt;/div&gt;&lt;/div&gt;`;
  } else if(idx===2){
    body.innerHTML=`&lt;div class=&quot;ms-title&quot;&gt;NO PATH&lt;/div&gt;&lt;div class=&quot;gate-box&quot; style=&quot;background:#fff5f5;border-color:#fca5a5&quot;&gt;&lt;div class=&quot;gb-head&quot; style=&quot;color:#dc2626&quot;&gt;✗ Deal Blocked&lt;/div&gt;&lt;div class=&quot;gb-rule&quot; style=&quot;color:#7f1d1d&quot;&gt;${n.no}&lt;/div&gt;&lt;/div&gt;`;
  } else {
    body.innerHTML=`&lt;div class=&quot;ms-title&quot;&gt;GATE STATISTICS&lt;/div&gt;&lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:24px;text-align:center;color:#94a3b8;font-size:12px;margin-top:4px&quot;&gt;📊 Live gate pass rates available when connected to deal pipeline data.&lt;/div&gt;`;
  }
}

function openModal(id){
  if(activeId){const old=cvs.querySelector(`[data-id=&quot;${activeId}&quot;]`);if(old)old.classList.remove(&#x27;active&#x27;)}
  activeId=id;
  const el=cvs.querySelector(`[data-id=&quot;${id}&quot;]`);if(el)el.classList.add(&#x27;active&#x27;);
  const n=NM[id];
  const ph=n.type===&#x27;gate&#x27;?{color:&#x27;#b45309&#x27;,bg:&#x27;#fffbeb&#x27;,icon:&#x27;⬧&#x27;}:(PH[n.phase]||PH.entry);
  const icon=document.getElementById(&#x27;mhIcon&#x27;);
  icon.style.background=ph.bg;icon.style.color=ph.color;icon.textContent=ph.icon;icon.style.display=&#x27;none&#x27;;
  document.getElementById(&#x27;mhTitle&#x27;).textContent=n.title||n.label;
  document.getElementById(&#x27;mhChip&#x27;).textContent=&#x27;&#x27;;
  document.getElementById(&#x27;mhDesc&#x27;).textContent=&#x27;&#x27;;
  document.querySelector(&#x27;#mheader .internal-badge&#x27;).style.display=&#x27;none&#x27;;
  document.getElementById(&#x27;mnav&#x27;).style.display=&#x27;none&#x27;;
  document.getElementById(&#x27;navList&#x27;).innerHTML=&#x27;&#x27;;
  document.getElementById(&#x27;mbody&#x27;).style.display=&#x27;none&#x27;;
  document.getElementById(&#x27;mbody&#x27;).innerHTML=&#x27;&#x27;;
  overlay.classList.add(&#x27;show&#x27;);
}

function closeModal(){
  overlay.classList.remove(&#x27;show&#x27;);
  if(activeId){const el=cvs.querySelector(`[data-id=&quot;${activeId}&quot;]`);if(el)el.classList.remove(&#x27;active&#x27;);activeId=null;}
}
document.getElementById(&#x27;modalClose&#x27;).onclick=closeModal;
overlay.addEventListener(&#x27;click&#x27;,e=&gt;{if(e.target===overlay)closeModal()});
document.addEventListener(&#x27;keydown&#x27;,e=&gt;{if(e.key===&#x27;Escape&#x27;)closeModal()});
wrap.addEventListener(&#x27;click&#x27;,()=&gt;{if(overlay.classList.contains(&#x27;show&#x27;))closeModal()});

const PERSONA_CONFIG = {
  all: {desc:&#x27;All stages visible. Full pipeline view.&#x27;, visible:[&#x27;entry&#x27;,&#x27;m01&#x27;,&#x27;m03&#x27;,&#x27;g1&#x27;,&#x27;m05&#x27;,&#x27;m04&#x27;,&#x27;g4&#x27;,&#x27;m06&#x27;,&#x27;g7&#x27;,&#x27;m07&#x27;,&#x27;m08&#x27;,&#x27;g8&#x27;,&#x27;m10&#x27;,&#x27;gmap&#x27;,&#x27;m12&#x27;,&#x27;g2&#x27;,&#x27;m13&#x27;,&#x27;legal&#x27;,&#x27;proc&#x27;,&#x27;contract&#x27;,&#x27;won&#x27;,&#x27;impl&#x27;], locked:[]},
  bdr: {desc:&#x27;BDR: Entry → Assessment → Lead Score → Gate 1 → Outreach. Discovery and beyond locked.&#x27;, visible:[&#x27;entry&#x27;,&#x27;m01&#x27;,&#x27;m03&#x27;,&#x27;g1&#x27;], locked:[&#x27;m05&#x27;,&#x27;m04&#x27;,&#x27;g4&#x27;,&#x27;m06&#x27;,&#x27;g7&#x27;,&#x27;m07&#x27;,&#x27;m08&#x27;,&#x27;g8&#x27;,&#x27;m10&#x27;,&#x27;gmap&#x27;,&#x27;m12&#x27;,&#x27;g2&#x27;,&#x27;m13&#x27;,&#x27;legal&#x27;,&#x27;proc&#x27;,&#x27;contract&#x27;]},
  rep: {desc:&#x27;Sales Rep: Full deal ownership — all stages visible for own deals.&#x27;, visible:[&#x27;entry&#x27;,&#x27;m01&#x27;,&#x27;m03&#x27;,&#x27;g1&#x27;,&#x27;m05&#x27;,&#x27;m04&#x27;,&#x27;g4&#x27;,&#x27;m06&#x27;,&#x27;g7&#x27;,&#x27;m07&#x27;,&#x27;g8&#x27;,&#x27;m10&#x27;,&#x27;gmap&#x27;,&#x27;m12&#x27;,&#x27;g2&#x27;,&#x27;m13&#x27;,&#x27;legal&#x27;,&#x27;proc&#x27;,&#x27;contract&#x27;,&#x27;won&#x27;], locked:[]},
  manager: {desc:&#x27;Manager: All stages + gates + override power + health% + coach scores + forecast.&#x27;, visible:[&#x27;entry&#x27;,&#x27;m01&#x27;,&#x27;m03&#x27;,&#x27;g1&#x27;,&#x27;m05&#x27;,&#x27;m04&#x27;,&#x27;g4&#x27;,&#x27;m06&#x27;,&#x27;g7&#x27;,&#x27;m07&#x27;,&#x27;m08&#x27;,&#x27;g8&#x27;,&#x27;m10&#x27;,&#x27;gmap&#x27;,&#x27;m12&#x27;,&#x27;g2&#x27;,&#x27;m13&#x27;,&#x27;legal&#x27;,&#x27;proc&#x27;,&#x27;contract&#x27;,&#x27;won&#x27;,&#x27;impl&#x27;], locked:[]},
  founder: {desc:&#x27;Founder: Strategic accounts only — Relationship Map, Executive Touch, Commercial View. Stage detail locked.&#x27;, visible:[&#x27;entry&#x27;,&#x27;m04&#x27;,&#x27;m06&#x27;,&#x27;m12&#x27;,&#x27;won&#x27;], locked:[&#x27;m01&#x27;,&#x27;m03&#x27;,&#x27;g1&#x27;,&#x27;m05&#x27;,&#x27;g4&#x27;,&#x27;g7&#x27;,&#x27;m07&#x27;,&#x27;m08&#x27;,&#x27;g8&#x27;,&#x27;m10&#x27;,&#x27;gmap&#x27;,&#x27;g2&#x27;,&#x27;m13&#x27;,&#x27;legal&#x27;,&#x27;proc&#x27;,&#x27;contract&#x27;,&#x27;impl&#x27;]},
  agreement: {desc:&#x27;Agreement Reviewer: Entry–Demo locked. Proposal → Contract → Review+Redline → Legal Approved only.&#x27;, visible:[&#x27;m12&#x27;,&#x27;m13&#x27;,&#x27;legal&#x27;], locked:[&#x27;entry&#x27;,&#x27;m01&#x27;,&#x27;m03&#x27;,&#x27;g1&#x27;,&#x27;m05&#x27;,&#x27;m04&#x27;,&#x27;g4&#x27;,&#x27;m06&#x27;,&#x27;g7&#x27;,&#x27;m07&#x27;,&#x27;m08&#x27;,&#x27;g8&#x27;,&#x27;m10&#x27;,&#x27;gmap&#x27;,&#x27;g2&#x27;,&#x27;proc&#x27;,&#x27;contract&#x27;,&#x27;won&#x27;]},
  admin: {desc:&#x27;Admin has no DAG — sees Config Panel instead: Module Config, Gate Config, Role &amp; Team, Integrations, Audit Log.&#x27;, visible:[], locked:[&#x27;entry&#x27;,&#x27;m01&#x27;,&#x27;m03&#x27;,&#x27;g1&#x27;,&#x27;m05&#x27;,&#x27;m04&#x27;,&#x27;g4&#x27;,&#x27;m06&#x27;,&#x27;g7&#x27;,&#x27;m07&#x27;,&#x27;m08&#x27;,&#x27;g8&#x27;,&#x27;m10&#x27;,&#x27;gmap&#x27;,&#x27;m12&#x27;,&#x27;g2&#x27;,&#x27;m13&#x27;,&#x27;legal&#x27;,&#x27;proc&#x27;,&#x27;contract&#x27;,&#x27;won&#x27;,&#x27;impl&#x27;]},

let adminOverlay = null;

function setPersona(btn, persona) {
  document.querySelectorAll(&#x27;.pf-btn&#x27;).forEach(b =&gt; b.classList.remove(&#x27;pf-active&#x27;));
  btn.classList.add(&#x27;pf-active&#x27;);
  
  const cfg = PERSONA_CONFIG[persona];
  document.getElementById(&#x27;personaDesc&#x27;).textContent = cfg.desc;
  
  // Remove admin overlay if exists
  if (adminOverlay) { adminOverlay.remove(); adminOverlay = null; }
  
  if (persona === &#x27;admin&#x27;) {
    // Show config panel overlay
    adminOverlay = document.createElement(&#x27;div&#x27;);
    adminOverlay.style.cssText = &#x27;position:fixed;top:94px;left:0;right:0;bottom:0;background:rgba(241,245,249,.97);z-index:800;display:flex;align-items:center;justify-content:center;&#x27;;
    adminOverlay.innerHTML = `&lt;div style=&quot;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:32px;max-width:520px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.1)&quot;&gt;&lt;div style=&quot;font-size:20px;font-weight:800;color:#0f172a;margin-bottom:6px&quot;&gt;⚙️ Admin Config Panel&lt;/div&gt;&lt;div style=&quot;font-size:12px;color:#64748b;margin-bottom:20px&quot;&gt;Admin persona has no DAG view. Config panel replaces the canvas.&lt;/div&gt;&lt;div style=&quot;display:grid;gap:10px&quot;&gt;&lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px&quot;&gt;&lt;div style=&quot;font-size:11px;font-weight:700;color:#0f172a;margin-bottom:4px&quot;&gt;⚙️ Module Config&lt;/div&gt;&lt;div style=&quot;font-size:11px;color:#64748b&quot;&gt;Activate / deactivate pipeline modules per client deployment&lt;/div&gt;&lt;/div&gt;&lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px&quot;&gt;&lt;div style=&quot;font-size:11px;font-weight:700;color:#0f172a;margin-bottom:4px&quot;&gt;🔒 Gate Config&lt;/div&gt;&lt;div style=&quot;font-size:11px;color:#64748b&quot;&gt;Set gate strictness, override permissions, and criteria per stage&lt;/div&gt;&lt;/div&gt;&lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px&quot;&gt;&lt;div style=&quot;font-size:11px;font-weight:700;color:#0f172a;margin-bottom:4px&quot;&gt;👥 Role &amp; Team&lt;/div&gt;&lt;div style=&quot;font-size:11px;color:#64748b&quot;&gt;User assignments, team structure, and persona role mapping&lt;/div&gt;&lt;/div&gt;&lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px&quot;&gt;&lt;div style=&quot;font-size:11px;font-weight:700;color:#0f172a;margin-bottom:4px&quot;&gt;🔗 Integrations&lt;/div&gt;&lt;div style=&quot;font-size:11px;color:#64748b&quot;&gt;Gmail/Outlook, calendar, meeting tools, DocuSign, ERP credentials&lt;/div&gt;&lt;/div&gt;&lt;div style=&quot;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px&quot;&gt;&lt;div style=&quot;font-size:11px;font-weight:700;color:#0f172a;margin-bottom:4px&quot;&gt;📋 Audit Log&lt;/div&gt;&lt;div style=&quot;font-size:11px;color:#64748b&quot;&gt;All config changes with timestamp, user, and before/after values&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;button onclick=&quot;setPersona(document.querySelector(&#x27;[data-persona=all]&#x27;),&#x27;all&#x27;)&quot; style=&quot;margin-top:18px;width:100%;padding:10px;background:#7c3aed;color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer&quot;&gt;← Back to Full DAG&lt;/button&gt;&lt;/div&gt;`;
    document.body.appendChild(adminOverlay);
    return;
  }
  
  // Apply visibility to all nodes
  const allCards = cvs.querySelectorAll(&#x27;.card[data-id], .gate[data-id]&#x27;);
  allCards.forEach(el =&gt; {
    const id = el.dataset.id;
    if (persona === &#x27;all&#x27;) {
      el.style.opacity = &#x27;&#x27;; el.style.pointerEvents = &#x27;&#x27;;
    } else if (cfg.locked.includes(id)) {
      el.style.opacity = &#x27;0.3&#x27;; el.style.pointerEvents = &#x27;none&#x27;;
    } else if (cfg.visible.length === 0 || cfg.visible.includes(id)) {
      el.style.opacity = &#x27;1&#x27;; el.style.pointerEvents = &#x27;&#x27;;
    } else {
      el.style.opacity = &#x27;0.5&#x27;; el.style.pointerEvents = &#x27;&#x27;;
    }
  });
}

@import url(&#x27;https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&amp;display=swap&#x27;);

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:&#x27;DM Sans&#x27;,-apple-system,system-ui,sans-serif;background:#f0f3f9;color:#1e293b;-webkit-font-smoothing:antialiased}

/* ── Top bar ── */
#bar{background:#0f172a;color:#fff;padding:13px 28px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200}
.b-logo{font-size:14px;font-weight:800}.b-logo em{color:#7c3aed;font-style:normal}
.b-tag{background:#7c3aed;color:#fff;font-size:9px;font-weight:700;padding:3px 9px;border-radius:10px;letter-spacing:.5px}
.b-desc{font-size:11px;color:#475569;margin-left:6px}

/* ── Tab strip ── */
#tabs{background:#fff;border-bottom:2px solid #e2e8f0;display:flex;padding:0 28px;gap:2px;position:sticky;top:50px;z-index:199;overflow-x:auto}
.tab{padding:11px 16px;font-size:11px;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.tab:hover{color:#475569}.tab.active{color:#7c3aed;border-bottom-color:#7c3aed}

/* ── Page wrap ── */
#page{max-width:1300px;margin:0 auto;padding:32px 28px}
.sec{display:none}.sec.active{display:block}
.sec-hd{margin-bottom:26px}
.sec-hd h2{font-size:21px;font-weight:800;color:#0f172a;margin-bottom:5px}
.sec-hd p{font-size:12px;color:#64748b;line-height:1.7;max-width:740px}

/* ── Utility ── */
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:860px){.g2,.g3{grid-template-columns:1fr}}

.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ct{font-size:13px;font-weight:700;color:#0f172a}.cs{font-size:10px;color:#94a3b8;margin-top:1px}

.pill{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;border:1px solid;letter-spacing:.3px;text-transform:uppercase}
.pv{background:#f5f3ff;color:#7c3aed;border-color:#ddd6fe}
.pb{background:#eff6ff;color:#2563eb;border-color:#bfdbfe}
.pg{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0}
.po{background:#fff7ed;color:#ea580c;border-color:#fed7aa}
.pr{background:#fff5f5;color:#dc2626;border-color:#fca5a5}
.py{background:#fffbeb;color:#b45309;border-color:#fde68a}
.pgr{background:#f8fafc;color:#64748b;border-color:#e2e8f0}

/* ── row bullets ── */
.rb{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:11px;color:#475569;line-height:1.5}
.rb:last-child{border:none}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;background:#7c3aed}
.dot-g{background:#16a34a}.dot-o{background:#f59e0b}.dot-r{background:#ef4444}

/* ── Layer stack diagram ── */
.stack{display:flex;flex-direction:column;gap:0}
.sl{border-radius:0;padding:16px 22px;border:1px solid #e2e8f0;border-bottom:none;display:flex;align-items:center;gap:18px;transition:background .15s}
.sl:first-child{border-radius:12px 12px 0 0}
.sl:last-child{border-radius:0 0 12px 12px;border-bottom:1px solid #e2e8f0}
.sl-num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.sl-title{font-size:12px;font-weight:700;color:#1e293b;min-width:160px}
.sl-desc{font-size:11px;color:#475569;line-height:1.5;flex:1}
.sl-items{display:flex;flex-wrap:wrap;gap:5px}

/* ── Mini DAG ── */
.dag-wrap{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:20px;overflow-x:auto}
.dag-canvas{display:flex;align-items:flex-start;gap:0;min-width:900px;position:relative}
.dag-col{display:flex;flex-direction:column;gap:8px;align-items:center}
.dc{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px 12px;width:130px;font-size:9px;font-weight:700;color:#475569;border-left:3px solid #e2e8f0;position:relative;cursor:pointer;transition:all .18s}
.dc:hover{box-shadow:0 3px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.dc .phase{font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;opacity:.7}
.dc .title{font-size:10px;font-weight:700;color:#0f172a;margin-bottom:2px}
.dc .agent{font-size:8px;color:#7c3aed;margin-top:4px}
.dc .status-dot{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%}
.dag-arrow{display:flex;align-items:center;padding-top:30px;color:#cbd5e1;font-size:16px;flex-shrink:0;margin:0 3px}
.dag-gate{width:40px;height:40px;background:#fffbeb;border:2px solid #f59e0b;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);display:flex;align-items:center;justify-content:center;font-size:11px;margin:14px auto}
.dag-label{font-size:8px;font-weight:700;color:#b45309;text-align:center;margin-top:2px;letter-spacing:.3px}

/* phase colors */
.ph-entry{border-left-color:#64748b}.ph-qualify{border-left-color:#16a34a}.ph-discover{border-left-color:#2563eb}
.ph-demo{border-left-color:#7c3aed}.ph-propose{border-left-color:#ea580c}.ph-close{border-left-color:#0891b2}

/* status */
.st-done{outline:2px solid #16a34a;outline-offset:2px}.st-done .status-dot{background:#16a34a}
.st-prog{outline:2px solid #2563eb;outline-offset:2px}.st-prog .status-dot{background:#2563eb}
.st-none{opacity:.55}.st-none .status-dot{background:#cbd5e1}
.st-blocked{outline:2px solid #ef4444;outline-offset:2px;background:#fff5f5}.st-blocked .status-dot{background:#ef4444}

/* Role view chips */
.role-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:10px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .15s}
.role-chip.sel{font-weight:800}

/* ── Overlay annotation ── */
.annotate{background:#fef9c3;border:1px solid #fde047;border-radius:8px;padding:8px 12px;font-size:10px;color:#713f12;line-height:1.5;margin-top:8px}
.annotate strong{color:#92400e}

/* ── Flow step ── */
.flow-step{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px}
.fs-num{width:30px;height:30px;border-radius:50%;background:#7c3aed;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.fs-body{flex:1}
.fs-title{font-size:12px;font-weight:700;color:#0f172a;margin-bottom:4px}
.fs-desc{font-size:11px;color:#475569;line-height:1.6}
.fs-sub{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;margin-top:8px;font-size:10px;color:#64748b;line-height:1.6}

/* ── Comparison table ── */
.comp{width:100%;border-collapse:collapse;font-size:11px}
.comp th{background:#f8fafc;padding:9px 13px;text-align:left;font-weight:700;color:#475569;border:1px solid #e2e8f0;font-size:9px;letter-spacing:.5px;text-transform:uppercase}
.comp td{padding:9px 13px;border:1px solid #e2e8f0;color:#475569;vertical-align:top;line-height:1.5}
.comp tr:hover td{background:#fafbff}
.comp td:first-child{font-weight:600;color:#1e293b}

/* ── Inline code ── */
code{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:1px 5px;font-size:10px;font-family:monospace}

/* ── Role DAG comparison ── */
.role-dag{border:1px solid #e2e8f0;border-radius:12px;overflow:hidden}
.rd-header{padding:12px 16px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:8px}
.rd-body{padding:14px 16px}
.rd-stages{display:flex;flex-wrap:wrap;gap:6px}
.rd-stage{padding:5px 10px;border-radius:7px;font-size:10px;font-weight:600;border:1px solid}

/* ── State transition ── */
.state-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:12px 0}
.sf-node{padding:8px 14px;border-radius:9px;font-size:10px;font-weight:700;border:1px solid;text-align:center}
.sf-arrow{color:#cbd5e1;font-size:18px;font-weight:300}

/* ── Info callout ── */
.callout{border-radius:10px;padding:14px 16px;font-size:11px;line-height:1.6;margin:12px 0}
.callout-purple{background:#f5f3ff;border:1px solid #ddd6fe;color:#4c1d95}
.callout-blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.callout-green{background:#f0fdf4;border:1px solid #bbf7d0;color:#14532d}
.callout-amber{background:#fffbeb;border:1px solid #fde68a;color:#78350f}
&lt;/style&gt;
