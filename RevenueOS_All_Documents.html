&lt;!-- ② EMAIL AS PRIMARY CHANNEL --&gt;

    &lt;h2&gt;📧 Email as the Only External Channel&lt;/h2&gt;
    &lt;p&gt;Since all client interaction flows through email, the Email Intelligence Agent is the most critical agent in the system. It is the bridge between the internal context graph and the outside world. Every email in/out must be captured, parsed, and acted on.&lt;/p&gt;

  &lt;div class=&quot;grid g2&quot; style=&quot;margin-bottom:20px&quot;&gt;

      &lt;div class=&quot;email-flow&quot;&gt;
        &lt;div class=&quot;ef-row&quot;&gt;&lt;div class=&quot;ef-stage&quot;&gt;Email arrives&lt;/div&gt;&lt;div class=&quot;ef-action&quot;&gt;Gmail/Outlook webhook fires → Email Intelligence Agent receives raw email&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;ef-row&quot;&gt;&lt;div class=&quot;ef-stage&quot;&gt;Identity resolve&lt;/div&gt;&lt;div class=&quot;ef-action&quot;&gt;Match sender to stakeholder in context graph. New contact? → Create stakeholder record + trigger enrichment&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;ef-row&quot;&gt;&lt;div class=&quot;ef-stage&quot;&gt;Signal extract&lt;/div&gt;&lt;div class=&quot;ef-action&quot;&gt;Parse for: buying signals, objections, budget hints, timeline urgency, competitor mentions, sentiment score&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;ef-row&quot;&gt;&lt;div class=&quot;ef-stage&quot;&gt;Context write&lt;/div&gt;&lt;div class=&quot;ef-action&quot;&gt;Append to &lt;code&gt;deal_context.email_thread_layer&lt;/code&gt;. Update pain layer, commercial layer if signals detected&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;ef-row&quot;&gt;&lt;div class=&quot;ef-stage&quot;&gt;DAG update&lt;/div&gt;&lt;div class=&quot;ef-action&quot;&gt;Relevant stage card gets &quot;New email signal&quot; badge. Gate re-evaluates if new data fills a requirement&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;ef-row&quot;&gt;&lt;div class=&quot;ef-stage&quot;&gt;Rep notified&lt;/div&gt;&lt;div class=&quot;ef-action&quot;&gt;&quot;Client replied — 3 signals detected. AI draft reply ready.&quot; Notification in-app + email to rep&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;ch&quot;&gt;&lt;div class=&quot;ci&quot; style=&quot;background:#f0fdf4;color:#16a34a&quot;&gt;📤&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Outbound Email — AI-Drafted, Human-Sent&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;Rep never writes from scratch — AI drafts, rep reviews and sends from own inbox&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;email-flow&quot;&gt;
        &lt;div class=&quot;ef-row&quot;&gt;&lt;div class=&quot;ef-stage&quot;&gt;Trigger&lt;/div&gt;&lt;div class=&quot;ef-action&quot;&gt;Rep clicks &quot;Draft Email&quot; on any DAG stage card. Or AI proactively surfaces &quot;Draft ready&quot; badge&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;ef-row&quot;&gt;&lt;div class=&quot;ef-stage&quot;&gt;Context load&lt;/div&gt;&lt;div class=&quot;ef-action&quot;&gt;AI reads context graph for this deal: stakeholder name, pain signals, last interaction, stage, objective&lt;/div&gt;&lt;/div&gt;

        &lt;div class=&quot;ef-row&quot;&gt;&lt;div class=&quot;ef-stage&quot;&gt;Send via inbox&lt;/div&gt;&lt;div class=&quot;ef-action&quot;&gt;Opens Gmail/Outlook compose with pre-populated draft. Rep clicks send from their own account — it looks like a personal email, not a tool blast&lt;/div&gt;&lt;/div&gt;

&lt;!-- ⑤ ROADMAP --&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-roadmap&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;🗺️ Phase Roadmap — Build Without Bloat&lt;/h2&gt;
    &lt;p&gt;The architecture is designed so every phase adds onto the same context graph, event bus, and agent mesh — never replaces it. Phase 1 builds the foundation that makes Phase 2 and 3 drop-in additions, not rewrites.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;callout ca&quot; style=&quot;margin-bottom:24px&quot;&gt;
    &lt;strong&gt;The rule:&lt;/strong&gt; If Phase 1 is built correctly — context graph schema right, event bus in place, agent interface defined — every Phase 2 and 3 feature is just a new agent that reads/writes from the same store. The DAG canvas gets new nodes. The modal gets new nav items. No architectural change required.
  &lt;/div&gt;

  &lt;div class=&quot;phase-wrap&quot;&gt;
    &lt;div class=&quot;phase-line&quot;&gt;&lt;/div&gt;

    &lt;!-- Phase 1 --&gt;
    &lt;div class=&quot;phase&quot;&gt;
      &lt;div class=&quot;phase-dot done&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;phase-card&quot;&gt;
        &lt;div class=&quot;phase-header&quot;&gt;
          &lt;div class=&quot;phase-badge&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;PHASE 1&lt;/div&gt;
          &lt;div&gt;
            &lt;div class=&quot;phase-title&quot;&gt;Foundation — Core Sales Execution Loop&lt;/div&gt;
            &lt;div class=&quot;phase-sub&quot;&gt;MVP that delivers immediate value. The minimum a sales team needs to see the difference on day 1.&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;phase-timeline&quot;&gt;Months 1–3&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;phase-body&quot;&gt;
          &lt;div&gt;
            &lt;div class=&quot;pb-col-title&quot;&gt;📱 Features to build &lt;span class=&quot;pl pg&quot;&gt;SHIP&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#7c3aed&quot;&gt;&lt;/div&gt;DAG canvas — 6 stages, Entry → Close (static layout, no drag)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#7c3aed&quot;&gt;&lt;/div&gt;Stage cards with status system (green / blue / grey)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#7c3aed&quot;&gt;&lt;/div&gt;Two-panel stage modal (left nav + right content)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#7c3aed&quot;&gt;&lt;/div&gt;Assessment module (11-category questionnaire + score)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#7c3aed&quot;&gt;&lt;/div&gt;Lead scoring (AI enrichment from domain → score)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#7c3aed&quot;&gt;&lt;/div&gt;Gmail / Outlook email sync (inbound read + outbound draft)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#7c3aed&quot;&gt;&lt;/div&gt;Basic stakeholder map (manual entry + LinkedIn enrichment)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#7c3aed&quot;&gt;&lt;/div&gt;2 Gates: Gate 1 (Qualify) + Gate 4 (Stakeholder)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#7c3aed&quot;&gt;&lt;/div&gt;BDR + Sales Rep + Admin roles&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#7c3aed&quot;&gt;&lt;/div&gt;Email Intelligence Agent (inbound parse + outbound draft)&lt;/div&gt;
          &lt;/div&gt;
          &lt;div&gt;
            &lt;div class=&quot;pb-col-title&quot;&gt;🏗️ Architecture built &lt;span class=&quot;pl pb&quot;&gt;INFRA&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Deal Context Graph schema (all 7 layers, even if empty)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Event bus (Supabase Realtime or Redis Streams)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Orchestration Agent skeleton (routes events to agents)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Agent interface contract (standard input/output shape)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Client config JSON (module toggles — most disabled initially)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Role-based API filtering (query param per role)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Context versioning (append-only writes)&lt;/div&gt;
            &lt;div class=&quot;arch-note&quot;&gt;&lt;strong&gt;Why this matters:&lt;/strong&gt; Building the full context graph schema now — even for fields agents don&#x27;t use yet — means Phase 2 agents just start writing to existing fields. Zero schema migrations needed.&lt;/div&gt;
          &lt;/div&gt;
          &lt;div&gt;
            &lt;div class=&quot;pb-col-title&quot;&gt;🚫 NOT in Phase 1 &lt;span class=&quot;pl pr&quot;&gt;DEFER&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#ef4444&quot;&gt;&lt;/div&gt;Meeting transcription (Google Meet bot) — Phase 2&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#ef4444&quot;&gt;&lt;/div&gt;AI proposal generation — Phase 2&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#ef4444&quot;&gt;&lt;/div&gt;Demo intelligence + Revenue Coach — Phase 2&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#ef4444&quot;&gt;&lt;/div&gt;Forecast Agent — Phase 2&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#ef4444&quot;&gt;&lt;/div&gt;Executive Command Center — Phase 3&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#ef4444&quot;&gt;&lt;/div&gt;Mobile app — Phase 3&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#ef4444&quot;&gt;&lt;/div&gt;ERP integration (SAP/Oracle) — Phase 3&lt;/div&gt;
            &lt;div class=&quot;no-build&quot;&gt;&lt;strong&gt;Bloat risk:&lt;/strong&gt; Trying to launch with all 10 agents active makes every feature half-finished. Phase 1&#x27;s Email Agent + Assessment Agent done excellently beats Phase 1 with 10 mediocre agents.&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- Phase 2 --&gt;
    &lt;div class=&quot;phase&quot;&gt;
      &lt;div class=&quot;phase-dot active&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;phase-card&quot;&gt;
        &lt;div class=&quot;phase-header&quot;&gt;
          &lt;div class=&quot;phase-badge&quot; style=&quot;background:#eff6ff;color:#2563eb&quot;&gt;PHASE 2&lt;/div&gt;
          &lt;div&gt;
            &lt;div class=&quot;phase-title&quot;&gt;Intelligence — AI Agents Go Full Depth&lt;/div&gt;
            &lt;div class=&quot;phase-sub&quot;&gt;Every stage gets an AI agent. Meeting intelligence, proposal generation, demo coaching, and full forecast come online.&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;phase-timeline&quot;&gt;Months 4–6&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;phase-body&quot;&gt;
          &lt;div&gt;
            &lt;div class=&quot;pb-col-title&quot;&gt;📱 New features &lt;span class=&quot;pl pb&quot;&gt;ADD-ON&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Meeting bot integration (Google Meet / Zoom → transcript)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Discovery Agent (transcript → pain extraction)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Demo Agent (AI demo script from discovery context)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Mutual Action Plan builder (AI-generated + editable)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Proposal Agent (full AI proposal from all deal context)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Negotiation Agent (objection tracking, counter positions)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Revenue Coach Agent (demo quality score → LMS)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Forecast Agent (win probability, pipeline health)&lt;/div&gt;
            &lt;div class=&quot;feat&quot;&gt;&lt;div class=&quot;feat-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;All 8 gates active and enforced&lt;/div&gt;

.fbul{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid #f8fafc;font-size:12px;color:#475569;line-height:1.5}
.fbul:last-child{border:none}
.fbul-dot{width:6px;height:6px;border-radius:50%;background:#7c3aed;flex-shrink:0;margin-top:5px}
.fbul-warn{background:#f59e0b}
.fbul-red{background:#ef4444}
.fbul-green{background:#16a34a}

/* ── Agent mesh ── */
.mesh{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:20px 0}
.agent{background:#fff;border:1px solid #ddd6fe;border-radius:12px;padding:14px 10px;text-align:center;cursor:default;transition:all .18s;position:relative}
.agent:hover{box-shadow:0 4px 16px rgba(124,58,237,.15);border-color:#c4b5fd;transform:translateY(-2px)}
.agent-ic{font-size:20px;margin-bottom:7px}
.agent-name{font-size:10px;font-weight:700;color:#4c1d95;line-height:1.3}
.agent-role{font-size:9px;color:#7c3aed;margin-top:3px}
.agent-tag{position:absolute;top:-7px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;font-size:8px;font-weight:700;padding:1px 7px;border-radius:8px;white-space:nowrap}

/* ── Context flow ── */
.ctx-row{display:flex;gap:0;align-items:stretch;margin-bottom:8px}
.ctx-label{width:160px;flex-shrink:0;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px 0 0 8px;padding:10px 12px;font-size:11px;font-weight:700;color:#475569;display:flex;align-items:center}
.ctx-val{flex:1;border:1px solid #e2e8f0;border-left:none;border-radius:0 8px 8px 0;padding:10px 14px;font-size:11px;color:#1e293b;line-height:1.6;background:#fff}
.ctx-tag{display:inline-block;background:#f5f3ff;color:#7c3aed;font-size:9px;font-weight:700;padding:1px 7px;border-radius:6px;margin:1px 2px}

/* ── Entry point diagram ── */
.ep-wrap{display:flex;flex-direction:column;gap:10px;margin:16px 0}
.ep-row{display:flex;align-items:stretch;gap:10px}
.ep-src{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-size:11px;font-weight:700;color:#475569;width:160px;flex-shrink:0;display:flex;align-items:center;gap:8px}
.ep-arrow{display:flex;align-items:center;color:#cbd5e1;font-size:18px;flex-shrink:0}
.ep-action{flex:1;border-radius:10px;padding:11px 14px;font-size:11px;color:#1e293b;line-height:1.5}
.ep-tag{font-size:9px;font-weight:700;padding:1px 7px;border-radius:6px;display:inline-block;margin-left:6px}

/* ── Role matrix ── */
.matrix{width:100%;border-collapse:collapse;font-size:11px}
.matrix th{background:#f8fafc;padding:9px 12px;text-align:left;font-weight:700;color:#475569;border:1px solid #e2e8f0;font-size:9px;letter-spacing:.5px;text-transform:uppercase}
.matrix td{padding:9px 12px;border:1px solid #e2e8f0;color:#475569;vertical-align:top}
.matrix tr:hover td{background:#fafbff}
.m-yes{color:#16a34a;font-weight:700;font-size:13px}
.m-no{color:#fca5a5;font-weight:700;font-size:13px}
.m-read{color:#f59e0b;font-weight:700;font-size:11px}
.m-row td:first-child{font-weight:700;color:#1e293b}

/* ── Edge case cards ── */
.ec-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;border-left:3px solid}
.ec-card.warn{border-left-color:#f59e0b}
.ec-card.err{border-left-color:#ef4444}
.ec-card.ok{border-left-color:#16a34a}
.ec-card.info{border-left-color:#2563eb}
.ec-title{font-size:12px;font-weight:700;color:#1e293b;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.ec-body{font-size:11px;color:#64748b;line-height:1.7}
.ec-fix{background:#f8fafc;border-radius:7px;padding:8px 10px;font-size:10px;font-weight:700;color:#475569;margin-top:8px;border:1px solid #e2e8f0}
.ec-fix span{color:#7c3aed}

/* ── Architecture diagram ── */
.arch{display:flex;flex-direction:column;gap:12px}
.arch-layer{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;display:flex;align-items:center;gap:16px}
.al-label{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#94a3b8;width:100px;flex-shrink:0}
.al-items{display:flex;flex-wrap:wrap;gap:8px;flex:1}
.al-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:6px 11px;font-size:10px;font-weight:600;color:#475569;display:flex;align-items:center;gap:6px}

/* ── Config block ── */
.cfg{background:#0f172a;border-radius:12px;padding:20px;font-family:&#x27;JetBrains Mono&#x27;,&#x27;Fira Code&#x27;,monospace;font-size:11px;line-height:1.8;color:#94a3b8;margin-top:12px;overflow-x:auto}
.cfg .k{color:#7dd3fc}.cfg .v{color:#a5f3fc}.cfg .s{color:#86efac}.cfg .c{color:#475569}.cfg .p{color:#f9a8d4}.cfg .o{color:#fde68a}

/* ── Section connectors ── */
.conn-wrap{position:relative;padding:20px 0}
.conn-line{position:absolute;left:50%;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,#ddd6fe,#e2e8f0);z-index:0}
.conn-node{position:relative;z-index:1;display:flex;align-items:center;gap:16px;margin-bottom:20px}
.conn-dot{width:12px;height:12px;border-radius:50%;border:2px solid #7c3aed;background:#fff;flex-shrink:0;margin-left:-5px}
.conn-content{flex:1;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px 15px;font-size:11px;color:#475569;line-height:1.6}
.conn-content strong{color:#1e293b;font-size:12px}

/* ── Inline code ── */
code{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:1px 5px;font-size:10px;font-family:monospace;color:#475569}

&lt;!-- ①  ENTRY POINTS --&gt;
&lt;div class=&quot;sec active&quot; id=&quot;sec-entry&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;Entry Points &amp; Flow Start&lt;/h2&gt;
    &lt;p&gt;The biggest mistake in a traditional CRM: assume every deal starts with assessment. In reality, deals arrive from 7+ different entry points — each with a different context signal strength. The AI must handle cold starts gracefully, build context from whatever is available, and still gate progression correctly.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;grid g2&quot; style=&quot;margin-bottom:28px&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#f0fdf4;color:#16a34a&quot;&gt;🗂️&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Full Flow (Ideal Path)&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;Entry → Assessment → Lead Score → Gate 1 (Qualify) → Outreach → Gate 2 → Discovery → Gate 3 → Demo → Gate 4 → Propose → Negotiate → Gate 5 → Close&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Assessment completed — all context available from day 1&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;AI has 360° signal: maturity score, pain, budget, timeline, personas&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;All gates enforceable with full data&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Proposal, demo script, negotiation all fully AI-generated&lt;/div&gt;
      &lt;div style=&quot;margin-top:12px&quot;&gt;&lt;span class=&quot;pill pill-green&quot;&gt;~35% of deals&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#fff7ed;color:#ea580c&quot;&gt;⚡&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Inbound / Warm Start&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;Call / Message / Referral → Fast-track qualification&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-warn&quot;&gt;&lt;/div&gt;No assessment — entry via inbound call, inbound email, referral (all external signals captured internally)&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-warn&quot;&gt;&lt;/div&gt;AI must infer context: enrich from firmographic data immediately&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-warn&quot;&gt;&lt;/div&gt;Qualification agent activates first — asks for minimum viable data&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-warn&quot;&gt;&lt;/div&gt;Assessment can be triggered retroactively as discovery unfolds&lt;/div&gt;
      &lt;div style=&quot;margin-top:12px&quot;&gt;&lt;span class=&quot;pill pill-orange&quot;&gt;~45% of deals&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#eff6ff;color:#2563eb&quot;&gt;🤝&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Founder / Executive Introduction&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;Direct founder relationship → bypasses early stages&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot&quot;&gt;&lt;/div&gt;Deal arrives via C-suite relationship or board introduction&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot&quot;&gt;&lt;/div&gt;Executive Agent activates — logs all interaction under Founder mode&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot&quot;&gt;&lt;/div&gt;Assessment triggered as parallel background task, not gating&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot&quot;&gt;&lt;/div&gt;Stakeholder agent pre-seeds with intro relationship context&lt;/div&gt;
      &lt;div style=&quot;margin-top:12px&quot;&gt;&lt;span class=&quot;pill pill-blue&quot;&gt;~12% of deals&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#fff5f5;color:#dc2626&quot;&gt;🔄&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Existing Customer / Expansion&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;Upsell, cross-sell, renewal — rich historical context&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-red&quot;&gt;&lt;/div&gt;Prior contract, interaction history, health score already exist&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-red&quot;&gt;&lt;/div&gt;AI skips assessment — imports prior context as baseline&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-red&quot;&gt;&lt;/div&gt;Forecast agent uses historical win data for probability&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-red&quot;&gt;&lt;/div&gt;Stakeholder map inherits from previous deal, updated for new contacts&lt;/div&gt;
      &lt;div style=&quot;margin-top:12px&quot;&gt;&lt;span class=&quot;pill pill-red&quot;&gt;~8% of deals&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot; style=&quot;margin-bottom:28px&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;🧠&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Entry Point Decision Tree — How AI Resolves Context&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;What the Orchestration Agent does on every new deal creation&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;ep-wrap&quot;&gt;
      &lt;div class=&quot;ep-row&quot;&gt;
        &lt;div class=&quot;ep-src&quot;&gt;📞 Inbound Call&lt;/div&gt;
        &lt;div class=&quot;ep-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;ep-action&quot; style=&quot;background:#f8fafc;border:1px solid #e2e8f0&quot;&gt;
          &lt;b&gt;Orchestrator checks:&lt;/b&gt; Does company exist in DB? → YES → load enrichment + prior interactions → Qualification Agent&lt;br&gt;
          → NO → trigger &lt;code&gt;company_enrich(domain)&lt;/code&gt; → firmographic data → Cold Qualification flow
          &lt;span class=&quot;ep-tag&quot; style=&quot;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0&quot;&gt;Context built from: Company size, Industry, Domain signals&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;ep-row&quot;&gt;
        &lt;div class=&quot;ep-src&quot;&gt;📧 Inbound Email&lt;/div&gt;
        &lt;div class=&quot;ep-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;ep-action&quot; style=&quot;background:#f8fafc;border:1px solid #e2e8f0&quot;&gt;
          &lt;b&gt;Email Intelligence Agent parses:&lt;/b&gt; Extracts company, role, pain signals, urgency keywords → maps to intent score → routes to appropriate stage
          &lt;span class=&quot;ep-tag&quot; style=&quot;background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe&quot;&gt;Signals: Urgency, Budget hint, Timeline, Problem statement&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;ep-row&quot;&gt;
        &lt;div class=&quot;ep-src&quot;&gt;💬 LinkedIn Signal&lt;/div&gt;
        &lt;div class=&quot;ep-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;ep-action&quot; style=&quot;background:#f8fafc;border:1px solid #e2e8f0&quot;&gt;
          &lt;b&gt;Rep logs LinkedIn contact internally:&lt;/b&gt; Rep pastes profile URL or name into RevenueOS → Stakeholder Agent enriches via LinkedIn API → role, seniority, company → stakeholder map seeded. &lt;em&gt;All subsequent communication happens via email — no LinkedIn integration for outbound.&lt;/em&gt;
          &lt;span class=&quot;ep-tag&quot; style=&quot;background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe&quot;&gt;Inbound signal only — enrichment, not outbound channel&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;ep-row&quot;&gt;
        &lt;div class=&quot;ep-src&quot;&gt;🤝 Referral&lt;/div&gt;
        &lt;div class=&quot;ep-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;ep-action&quot; style=&quot;background:#f8fafc;border:1px solid #e2e8f0&quot;&gt;
          &lt;b&gt;Executive Agent activates:&lt;/b&gt; Who referred? → map relationship graph → founder note auto-logged → deal flagged &quot;strategic&quot; → expedited qualification
          &lt;span class=&quot;ep-tag&quot; style=&quot;background:#fffbeb;color:#b45309;border:1px solid #fde68a&quot;&gt;Priority: High — Gate rules relaxed for first 7 days&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;ep-row&quot;&gt;
        &lt;div class=&quot;ep-src&quot;&gt;📊 Assessment Done&lt;/div&gt;
        &lt;div class=&quot;ep-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;ep-action&quot; style=&quot;background:#f0fdf4;border:1px solid #bbf7d0&quot;&gt;
          &lt;b&gt;Full context available immediately:&lt;/b&gt; Maturity score, pain categories, risk exposure, all 11 categories scored → All agents pre-loaded → Full flow unlocked
          &lt;span class=&quot;ep-tag&quot; style=&quot;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0&quot;&gt;Best path — AI accuracy highest&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#fffbeb;color:#b45309&quot;&gt;⚠️&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Context Confidence Score&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;Every deal has a real-time AI confidence rating that governs gate strictness&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;grid g4&quot;&gt;
      &lt;div style=&quot;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;text-align:center&quot;&gt;
        &lt;div style=&quot;font-size:22px;font-weight:800;color:#16a34a&quot;&gt;90–100%&lt;/div&gt;
        &lt;div style=&quot;font-size:10px;font-weight:700;color:#15803d;margin-top:4px&quot;&gt;FULL CONFIDENCE&lt;/div&gt;
        &lt;div style=&quot;font-size:10px;color:#64748b;margin-top:6px;line-height:1.5&quot;&gt;Assessment + Discovery + 4+ stakeholders. All gates enforced at full strictness.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:14px;text-align:center&quot;&gt;
        &lt;div style=&quot;font-size:22px;font-weight:800;color:#2563eb&quot;&gt;65–89%&lt;/div&gt;
        &lt;div style=&quot;font-size:10px;font-weight:700;color:#1d4ed8;margin-top:4px&quot;&gt;HIGH CONFIDENCE&lt;/div&gt;
        &lt;div style=&quot;font-size:10px;color:#64748b;margin-top:6px;line-height:1.5&quot;&gt;2+ meetings + qualification done. Gates enforced. AI fills gaps with enrichment.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px;text-align:center&quot;&gt;
        &lt;div style=&quot;font-size:22px;font-weight:800;color:#b45309&quot;&gt;35–64%&lt;/div&gt;
        &lt;div style=&quot;font-size:10px;font-weight:700;color:#92400e;margin-top:4px&quot;&gt;PARTIAL CONFIDENCE&lt;/div&gt;
        &lt;div style=&quot;font-size:10px;color:#64748b;margin-top:6px;line-height:1.5&quot;&gt;Cold start — enrichment only. Gates flag missing data. Admin override required.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#fff5f5;border:1px solid #fca5a5;border-radius:10px;padding:14px;text-align:center&quot;&gt;
        &lt;div style=&quot;font-size:22px;font-weight:800;color:#dc2626&quot;&gt;0–34%&lt;/div&gt;
        &lt;div style=&quot;font-size:10px;font-weight:700;color:#991b1b;margin-top:4px&quot;&gt;LOW CONFIDENCE&lt;/div&gt;
        &lt;div style=&quot;font-size:10px;color:#64748b;margin-top:6px;line-height:1.5&quot;&gt;Minimal data. Deal locked for progression. AI surfaces data collection tasks.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ② MULTI-AGENT MESH --&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-agents&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;Multi-Agent Mesh Architecture&lt;/h2&gt;
    &lt;p&gt;RevenueOS runs 10 specialised agents that operate independently but share a unified context store. No agent is a standalone silo — each reads from and writes to the same deal context graph. An Orchestration Agent is the only entity that directly instructs other agents, maintaining the chain of causality.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot; style=&quot;margin-bottom:24px&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;🧠&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Orchestration Agent — The Master Controller&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;Never seen by end users — operates as the invisible backbone of every deal&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;grid g3&quot; style=&quot;margin-top:8px&quot;&gt;

&lt;!-- ③ CONTEXT ARCHITECTURE --&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-context&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;Context Architecture&lt;/h2&gt;
    &lt;p&gt;The biggest challenge in a multi-agent system is: who owns the truth? RevenueOS solves this with a unified Deal Context Graph — a single source of truth that every agent reads from and writes to. No agent can hold private state. All agent outputs are reconciled and versioned.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot; style=&quot;margin-bottom:20px&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;🗄️&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Deal Context Graph — The Unified Truth Store&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;Every piece of information about a deal, structured for agent consumption&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;ctx-row&quot;&gt;&lt;div class=&quot;ctx-label&quot;&gt;🏢 Company Layer&lt;/div&gt;&lt;div class=&quot;ctx-val&quot;&gt;&lt;span class=&quot;ctx-tag&quot;&gt;company_id&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;domain&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;industry&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;workforce_size&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;maturity_score&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;risk_score&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;compliance_score&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;digital_score&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;source: assessment | enrichment&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;ctx-row&quot;&gt;&lt;div class=&quot;ctx-label&quot;&gt;👥 Stakeholder Layer&lt;/div&gt;&lt;div class=&quot;ctx-val&quot;&gt;&lt;span class=&quot;ctx-tag&quot;&gt;stakeholder_map[]&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;role_type&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;influence_score&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;sentiment_score&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;last_interaction&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;advocate | neutral | blocker&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;economic_buyer_confirmed&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;champion_identified&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;ctx-row&quot;&gt;&lt;div class=&quot;ctx-label&quot;&gt;😣 Pain Layer&lt;/div&gt;&lt;div class=&quot;ctx-val&quot;&gt;&lt;span class=&quot;ctx-tag&quot;&gt;pain_statements[]&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;pain_category&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;business_impact&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;urgency_score&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;compliance_gaps[]&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;financial_exposure&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;source: assessment | transcript | email&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;ctx-row&quot;&gt;&lt;div class=&quot;ctx-label&quot;&gt;💰 Commercial Layer&lt;/div&gt;&lt;div class=&quot;ctx-val&quot;&gt;&lt;span class=&quot;ctx-tag&quot;&gt;budget_range&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;decision_process&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;timeline&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;success_criteria[]&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;procurement_route&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;competitive_landscape[]&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;pricing_sensitivity&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;ctx-row&quot;&gt;&lt;div class=&quot;ctx-label&quot;&gt;🎙️ Interaction Layer&lt;/div&gt;&lt;div class=&quot;ctx-val&quot;&gt;&lt;span class=&quot;ctx-tag&quot;&gt;meetings[]&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;transcripts[]&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;emails[]&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;whatsapp_threads[]&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;signal_vector&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;buying_signals[]&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;competitor_mentions[]&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;ctx-row&quot;&gt;&lt;div class=&quot;ctx-label&quot;&gt;📊 Deal State Layer&lt;/div&gt;&lt;div class=&quot;ctx-val&quot;&gt;&lt;span class=&quot;ctx-tag&quot;&gt;stage_id&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;confidence_score&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;gate_statuses{}&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;map_completion_%&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;blockers[]&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;win_probability&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;forecast_category&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;ctx-row&quot;&gt;&lt;div class=&quot;ctx-label&quot;&gt;🤖 AI Output Layer&lt;/div&gt;&lt;div class=&quot;ctx-val&quot;&gt;&lt;span class=&quot;ctx-tag&quot;&gt;demo_script_v{n}&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;proposal_v{n}&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;negotiation_strategy&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;coach_score&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;forecast_narrative&lt;/span&gt;&lt;span class=&quot;ctx-tag&quot;&gt;agent_audit_log[]&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;grid g2&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#f0fdf4;color:#16a34a&quot;&gt;🔄&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Context Versioning&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;Every agent write is versioned — nothing is overwritten&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Each agent output tagged: &lt;code&gt;agent_id + timestamp + confidence_score&lt;/code&gt;&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Conflicting signals kept as parallel versions — orchestrator resolves&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;User can override any AI-generated field — logged as &lt;code&gt;human_override&lt;/code&gt;&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Full audit trail: who wrote what, when, with what confidence&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-green&quot;&gt;&lt;/div&gt;Rollback available to any previous context state&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#fff7ed;color:#ea580c&quot;&gt;⚠️&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Context Gaps — How AI Handles Missing Data&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;When a field is empty, agents don&#x27;t fail — they adapt&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-warn&quot;&gt;&lt;/div&gt;&lt;b&gt;No assessment:&lt;/b&gt; Agent uses firmographic enrichment as proxy — lower confidence&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-warn&quot;&gt;&lt;/div&gt;&lt;b&gt;No transcript:&lt;/b&gt; Agent asks rep to fill structured pain statement form&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-warn&quot;&gt;&lt;/div&gt;&lt;b&gt;No budget signal:&lt;/b&gt; Proposal agent uses industry benchmark ranges instead&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-warn&quot;&gt;&lt;/div&gt;&lt;b&gt;Missing stakeholders:&lt;/b&gt; Gate flags — admin can grant temporary override&lt;/div&gt;
      &lt;div class=&quot;fbul&quot;&gt;&lt;div class=&quot;fbul-dot fbul-warn&quot;&gt;&lt;/div&gt;&lt;b&gt;No meeting captured:&lt;/b&gt; AI prompts rep for manual meeting summary&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot; style=&quot;margin-top:16px&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;card-ic&quot; style=&quot;background:#eff6ff;color:#2563eb&quot;&gt;🔁&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;card-title&quot;&gt;Context Propagation Flow&lt;/div&gt;&lt;div class=&quot;card-sub&quot;&gt;How a single event updates the entire deal graph&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;conn-wrap&quot;&gt;
      &lt;div class=&quot;conn-line&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;conn-node&quot;&gt;&lt;div class=&quot;conn-dot&quot;&gt;&lt;/div&gt;&lt;div class=&quot;conn-content&quot;&gt;&lt;strong&gt;Event fires:&lt;/strong&gt; New meeting transcript available (Google Meet recording uploaded)&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;conn-node&quot;&gt;&lt;div class=&quot;conn-dot&quot;&gt;&lt;/div&gt;&lt;div class=&quot;conn-content&quot;&gt;&lt;strong&gt;Discovery Agent:&lt;/strong&gt; Parses transcript → extracts 3 pain statements, 2 new stakeholder names, 1 buying signal, competitor mention &quot;XYZ Tool&quot;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;conn-node&quot;&gt;&lt;div class=&quot;conn-dot&quot;&gt;&lt;/div&gt;&lt;div class=&quot;conn-content&quot;&gt;&lt;strong&gt;Writes to Context Graph:&lt;/strong&gt; &lt;code&gt;pain_statements[] += [...3 new]&lt;/code&gt;, &lt;code&gt;buying_signals[] += [1]&lt;/code&gt;, &lt;code&gt;competitive_landscape[] += [&quot;XYZ Tool&quot;]&lt;/code&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;conn-node&quot;&gt;&lt;div class=&quot;conn-dot&quot;&gt;&lt;/div&gt;&lt;div class=&quot;conn-content&quot;&gt;&lt;strong&gt;Stakeholder Agent triggered:&lt;/strong&gt; Sees 2 new names → enriches via LinkedIn API → adds to stakeholder map → updates coverage score&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;conn-node&quot;&gt;&lt;div class=&quot;conn-dot&quot;&gt;&lt;/div&gt;&lt;div class=&quot;conn-content&quot;&gt;&lt;strong&gt;Forecast Agent triggered:&lt;/strong&gt; Meeting velocity up → pain score up → win probability updated → forecast narrative regenerated&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;conn-node&quot;&gt;&lt;div class=&quot;conn-dot&quot;&gt;&lt;/div&gt;&lt;div class=&quot;conn-content&quot;&gt;&lt;strong&gt;Gate re-evaluated:&lt;/strong&gt; Stakeholder count now 4 → Gate 4 auto-passes → stage advancement unlocked → notification sent to rep&lt;/div&gt;&lt;/div&gt;

&lt;!-- ④ ROLE &amp; ACCESS --&gt;
