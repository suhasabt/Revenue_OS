&lt;div id=&quot;bar&quot;&gt;
  &lt;div class=&quot;b-logo&quot;&gt;BeeForce &lt;em&gt;RevenueOS&lt;/em&gt;&lt;/div&gt;
  &lt;div class=&quot;b-tag&quot;&gt;DAG AS UX LAYER&lt;/div&gt;
  &lt;div class=&quot;b-desc&quot;&gt;How the DAG canvas connects architecture to user experience&lt;/div&gt;
&lt;/div&gt;

&lt;div id=&quot;tabs&quot;&gt;
  &lt;div class=&quot;tab active&quot; onclick=&quot;go(&#x27;why&#x27;)&quot;&gt;① Why DAG?&lt;/div&gt;
  &lt;div class=&quot;tab&quot; onclick=&quot;go(&#x27;layer&#x27;)&quot;&gt;② DAG in the Stack&lt;/div&gt;
  &lt;div class=&quot;tab&quot; onclick=&quot;go(&#x27;ux&#x27;)&quot;&gt;③ UX Flow — Card to Agent&lt;/div&gt;
  &lt;div class=&quot;tab&quot; onclick=&quot;go(&#x27;entry&#x27;)&quot;&gt;④ Entry Points on DAG&lt;/div&gt;
  &lt;div class=&quot;tab&quot; onclick=&quot;go(&#x27;roles&#x27;)&quot;&gt;⑤ Role Views on DAG&lt;/div&gt;
  &lt;div class=&quot;tab&quot; onclick=&quot;go(&#x27;states&#x27;)&quot;&gt;⑥ Deal States &amp; Reopen&lt;/div&gt;
  &lt;div class=&quot;tab&quot; onclick=&quot;go(&#x27;mobile&#x27;)&quot;&gt;⑦ Mobile &amp; Navigation&lt;/div&gt;
  &lt;div class=&quot;tab&quot; onclick=&quot;go(&#x27;justify&#x27;)&quot;&gt;⑧ Justify to Devs &amp; Stakeholders&lt;/div&gt;
&lt;/div&gt;

&lt;div id=&quot;page&quot;&gt;

&lt;!-- ① WHY DAG --&gt;
&lt;div class=&quot;sec active&quot; id=&quot;sec-why&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;Why DAG is the Right UX for RevenueOS&lt;/h2&gt;
    &lt;p&gt;Every other sales tool uses a list, table, or kanban. RevenueOS is fundamentally different — it has stages with dependencies, gates that block progression, agents running in parallel, and deals that can have multiple entry points. Only a DAG (Directed Acyclic Graph) can represent all of this honestly.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;grid g3&quot; style=&quot;margin-bottom:24px&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;🔗&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Dependencies are real&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;Can&#x27;t do step 6 without steps 3 + 4&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;A demo script cannot be generated without discovery pain data — this is a hard dependency, not a preference&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;A proposal cannot be written without a confirmed economic buyer — this is a real-world fact&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;DAG connectors make these dependencies &lt;em&gt;visible&lt;/em&gt; to the rep — no one can claim they didn&#x27;t know&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#eff6ff;color:#2563eb&quot;&gt;🔀&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Flows aren&#x27;t linear&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;Some stages run in parallel, some are skipped&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;Stakeholder mapping runs across ALL stages — it&#x27;s always on, not a single step&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;Executive touch is a parallel track, not a stage in the sequence&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;Revenue Coach fires after demo — not blocking, but branching. A table or kanban can&#x27;t show this&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#f0fdf4;color:#16a34a&quot;&gt;👁️&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Status is spatial&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;Where you are in the DAG = where you are in the deal&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Green nodes: done — rep can see exactly what&#x27;s completed at a glance&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;Blue nodes: in progress — exactly where attention is needed right now&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot; style=&quot;background:#cbd5e1&quot;&gt;&lt;/div&gt;Grey nodes: not started — clear map of what&#x27;s ahead without overwhelming the rep&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot; style=&quot;margin-bottom:20px&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#f8fafc&quot;&gt;⚡&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;The DAG vs Alternatives — Why Others Fail for RevenueOS&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;table class=&quot;comp&quot;&gt;
      &lt;tr&gt;&lt;th&gt;UI Pattern&lt;/th&gt;&lt;th&gt;What it shows well&lt;/th&gt;&lt;th&gt;Why it fails for RevenueOS&lt;/th&gt;&lt;th&gt;Verdict&lt;/th&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;Kanban Board&lt;/td&gt;&lt;td&gt;Stage pipeline at a glance, simple drag-drop&lt;/td&gt;&lt;td&gt;No dependencies — reps can drag a card to &quot;Propose&quot; without completing Discovery. Gates become invisible. AI agents have no surface.&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;pill pr&quot;&gt;❌ FAILS&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;List / Table View&lt;/td&gt;&lt;td&gt;Dense data, sortable, filterable&lt;/td&gt;&lt;td&gt;Cannot show relationships between stages. No visual of &quot;you can&#x27;t do X before Y.&quot; Feels like a spreadsheet — not an AI platform.&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;pill pr&quot;&gt;❌ FAILS&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;Wizard / Stepper&lt;/td&gt;&lt;td&gt;Linear guided flow, one step at a time&lt;/td&gt;&lt;td&gt;Enterprise deals are NOT linear. Stakeholder mapping runs at all stages. Executive track runs in parallel. A wizard would force a fake linearity.&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;pill po&quot;&gt;⚠️ PARTIAL&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;Process Map / Flowchart&lt;/td&gt;&lt;td&gt;Shows flow and decisions&lt;/td&gt;&lt;td&gt;Static — can&#x27;t reflect real-time deal state. No interactivity per node. Can&#x27;t open agent outputs. Viewers, not actors.&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;pill po&quot;&gt;⚠️ READ-ONLY&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;DAG Infinite Canvas ✓&lt;/td&gt;&lt;td&gt;Dependencies, parallel tracks, status, gates, AI outputs per node&lt;/td&gt;&lt;td&gt;Slightly more complex to build. Worth it: every piece of information is spatially locatable, no information hidden in a different screen.&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;pill pg&quot;&gt;✓ WINS&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;
  &lt;/div&gt;

  &lt;div class=&quot;callout callout-purple&quot;&gt;
    &lt;strong&gt;The core insight:&lt;/strong&gt; The DAG is not a diagram — it is the &lt;em&gt;navigation system&lt;/em&gt; for the entire platform. Clicking a node on the DAG is how a rep opens their discovery report, reads their AI-generated demo script, or sees which gate is blocking them. The DAG replaces the left sidebar, the breadcrumb trail, and the menu system all at once. &lt;strong&gt;It IS the app.&lt;/strong&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ② DAG IN THE STACK --&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-layer&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;Where DAG Sits in the Architecture Stack&lt;/h2&gt;
    &lt;p&gt;The DAG is the presentation layer. It reads from the same context graph that all agents write to. When an agent completes a task, the DAG node for that stage automatically updates — no refresh needed. The DAG is a live, real-time view of the deal&#x27;s health.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;stack&quot; style=&quot;margin-bottom:24px&quot;&gt;
    &lt;div class=&quot;sl&quot; style=&quot;background:#f5f3ff;border-color:#ddd6fe&quot;&gt;
      &lt;div class=&quot;sl-num&quot; style=&quot;background:#7c3aed;color:#fff&quot;&gt;1&lt;/div&gt;
      &lt;div class=&quot;sl-title&quot; style=&quot;color:#7c3aed&quot;&gt;👤 USER — DAG Canvas&lt;/div&gt;
      &lt;div class=&quot;sl-desc&quot;&gt;What the rep/manager/founder sees. Cards, status colours, gate diamonds, phase labels. Clicking a card opens the modal. This is the only layer users directly interact with.&lt;/div&gt;
      &lt;div class=&quot;sl-items&quot;&gt;&lt;span class=&quot;pill pv&quot;&gt;React Infinite Canvas&lt;/span&gt;&lt;span class=&quot;pill pv&quot;&gt;SVG Bezier Connectors&lt;/span&gt;&lt;span class=&quot;pill pv&quot;&gt;Card Modal&lt;/span&gt;&lt;span class=&quot;pill pv&quot;&gt;Real-time updates&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;sl&quot; style=&quot;background:#eff6ff;border-color:#bfdbfe&quot;&gt;
      &lt;div class=&quot;sl-num&quot; style=&quot;background:#2563eb;color:#fff&quot;&gt;2&lt;/div&gt;
      &lt;div class=&quot;sl-title&quot; style=&quot;color:#2563eb&quot;&gt;🖥️ UI STATE — Deal Renderer&lt;/div&gt;
      &lt;div class=&quot;sl-desc&quot;&gt;Reads deal state from context graph → maps to visual state per node. Maps &lt;code&gt;stage.status&lt;/code&gt; → card colour, &lt;code&gt;gate.passed&lt;/code&gt; → diamond colour, &lt;code&gt;agent.output&lt;/code&gt; → modal content. Role-aware: filters nodes based on user permission.&lt;/div&gt;
      &lt;div class=&quot;sl-items&quot;&gt;&lt;span class=&quot;pill pb&quot;&gt;Zustand store&lt;/span&gt;&lt;span class=&quot;pill pb&quot;&gt;Role filter&lt;/span&gt;&lt;span class=&quot;pill pb&quot;&gt;Status mapping&lt;/span&gt;&lt;span class=&quot;pill pb&quot;&gt;Supabase realtime&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;sl&quot; style=&quot;background:#f0fdf4;border-color:#bbf7d0&quot;&gt;
      &lt;div class=&quot;sl-num&quot; style=&quot;background:#16a34a;color:#fff&quot;&gt;3&lt;/div&gt;
      &lt;div class=&quot;sl-title&quot; style=&quot;color:#16a34a&quot;&gt;⚡ EVENT BUS — Deal Events&lt;/div&gt;
      &lt;div class=&quot;sl-desc&quot;&gt;The bridge between backend and DAG. When an agent completes, a &lt;code&gt;stage.updated&lt;/code&gt; event fires. The DAG subscribes and re-renders the affected node. No polling. Sub-second updates. One event can update multiple nodes (e.g., discovery completion updates both the discovery node AND the demo node state).&lt;/div&gt;
      &lt;div class=&quot;sl-items&quot;&gt;&lt;span class=&quot;pill pg&quot;&gt;Supabase Realtime&lt;/span&gt;&lt;span class=&quot;pill pg&quot;&gt;Redis Pub/Sub&lt;/span&gt;&lt;span class=&quot;pill pg&quot;&gt;WebSocket&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;sl&quot; style=&quot;background:#fff7ed;border-color:#fed7aa&quot;&gt;
      &lt;div class=&quot;sl-num&quot; style=&quot;background:#ea580c;color:#fff&quot;&gt;4&lt;/div&gt;
      &lt;div class=&quot;sl-title&quot; style=&quot;color:#ea580c&quot;&gt;🤖 AGENT LAYER — 10 Agents&lt;/div&gt;
      &lt;div class=&quot;sl-desc&quot;&gt;Each agent maps to one or more DAG nodes. Assessment Agent → Entry node. Discovery Agent → all 3 discovery nodes. When an agent runs, it writes to the context graph AND emits an event. The DAG node shows a loading spinner while the agent runs, then snaps to the completed state.&lt;/div&gt;
      &lt;div class=&quot;sl-items&quot;&gt;&lt;span class=&quot;pill po&quot;&gt;Assessment&lt;/span&gt;&lt;span class=&quot;pill po&quot;&gt;Discovery&lt;/span&gt;&lt;span class=&quot;pill po&quot;&gt;Stakeholder&lt;/span&gt;&lt;span class=&quot;pill po&quot;&gt;Demo&lt;/span&gt;&lt;span class=&quot;pill po&quot;&gt;Proposal&lt;/span&gt;&lt;span class=&quot;pill po&quot;&gt;Forecast&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;sl&quot; style=&quot;background:#f8fafc;border-color:#e2e8f0&quot;&gt;
      &lt;div class=&quot;sl-num&quot; style=&quot;background:#475569;color:#fff&quot;&gt;5&lt;/div&gt;
      &lt;div class=&quot;sl-title&quot;&gt;🗄️ DATA LAYER — Context Graph&lt;/div&gt;
      &lt;div class=&quot;sl-desc&quot;&gt;The single source of truth. Agents read from here and write to here. The DAG renderer reads from here. Every node on the DAG maps to a record in the context graph. Gate status, completion percentage, agent outputs, human overrides — all stored here, versioned, append-only.&lt;/div&gt;
      &lt;div class=&quot;sl-items&quot;&gt;&lt;span class=&quot;pill pgr&quot;&gt;PostgreSQL&lt;/span&gt;&lt;span class=&quot;pill pgr&quot;&gt;pgvector&lt;/span&gt;&lt;span class=&quot;pill pgr&quot;&gt;Redis cache&lt;/span&gt;&lt;span class=&quot;pill pgr&quot;&gt;Append-only&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;grid g2&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;🔄&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;DAG Node Lifecycle&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;What happens from empty node to completed&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;flow-step&quot;&gt;
        &lt;div class=&quot;fs-num&quot;&gt;1&lt;/div&gt;
        &lt;div class=&quot;fs-body&quot;&gt;&lt;div class=&quot;fs-title&quot;&gt;Node Created&lt;/div&gt;&lt;div class=&quot;fs-desc&quot;&gt;Deal created → all DAG nodes rendered in &lt;code&gt;status: none&lt;/code&gt; (grey, locked). Only Entry node is active.&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;flow-step&quot;&gt;
        &lt;div class=&quot;fs-num&quot;&gt;2&lt;/div&gt;
        &lt;div class=&quot;fs-body&quot;&gt;&lt;div class=&quot;fs-title&quot;&gt;Agent Triggered&lt;/div&gt;&lt;div class=&quot;fs-desc&quot;&gt;User action or event fires → agent starts → node shows &lt;code&gt;status: running&lt;/code&gt; (blue pulsing border + spinner inside card).&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;flow-step&quot;&gt;
        &lt;div class=&quot;fs-num&quot;&gt;3&lt;/div&gt;
        &lt;div class=&quot;fs-body&quot;&gt;&lt;div class=&quot;fs-title&quot;&gt;Output Available&lt;/div&gt;&lt;div class=&quot;fs-desc&quot;&gt;Agent writes to context graph → event fires → node renders &lt;code&gt;status: ai_ready&lt;/code&gt; (blue outline + &quot;Review ✦ AI&quot; badge). Modal now shows agent output.&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;flow-step&quot; style=&quot;margin-bottom:0&quot;&gt;
        &lt;div class=&quot;fs-num&quot;&gt;4&lt;/div&gt;
        &lt;div class=&quot;fs-body&quot;&gt;&lt;div class=&quot;fs-title&quot;&gt;Human Confirms&lt;/div&gt;&lt;div class=&quot;fs-desc&quot;&gt;Rep opens modal → reviews AI output → clicks Confirm → node snaps to &lt;code&gt;status: done&lt;/code&gt; (green outline). Downstream nodes unlock.&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#fffbeb;color:#b45309&quot;&gt;🔒&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Gate Node — How it Works in DAG&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;The diamond shapes between stages&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-o&quot;&gt;&lt;/div&gt;&lt;b&gt;Closed (amber):&lt;/b&gt; Upstream stages not all complete. Arrow into gate is dashed. Cannot be clicked or bypassed.&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;&lt;b&gt;Open (green):&lt;/b&gt; All required upstream nodes confirmed. Gate auto-evaluates. Arrow turns solid.&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-r&quot;&gt;&lt;/div&gt;&lt;b&gt;Blocked (red):&lt;/b&gt; Gate evaluated but failed — missing data. Red diamond. Clicking shows exactly which fields are missing.&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot; style=&quot;background:#7c3aed&quot;&gt;&lt;/div&gt;&lt;b&gt;Override (purple):&lt;/b&gt; Manager used override. Gate shows purple with &quot;Override by [name]&quot; badge. Still audited.&lt;/div&gt;
      &lt;div class=&quot;annotate&quot;&gt;&lt;strong&gt;Key UX decision:&lt;/strong&gt; Gates are not modals or alerts — they are spatial objects on the canvas. The rep can see a blocked gate from across the DAG without clicking anything. This makes governance visible without it being annoying.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ③ UX FLOW — CARD TO AGENT --&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-ux&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;UX Flow — From Card Click to Agent Output&lt;/h2&gt;
    &lt;p&gt;This is the most important UX journey in RevenueOS: the rep sees a card on the DAG, clicks it, and the AI has already prepared everything they need. Zero navigation. Zero hunting for information. The modal is the work surface.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot; style=&quot;margin-bottom:20px&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;🎯&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;The Complete Click Journey — Discovery Card Example&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;

    &lt;div class=&quot;flow-step&quot;&gt;
      &lt;div class=&quot;fs-num&quot; style=&quot;background:#2563eb&quot;&gt;1&lt;/div&gt;
      &lt;div class=&quot;fs-body&quot;&gt;
        &lt;div class=&quot;fs-title&quot;&gt;Rep opens their deal on the DAG canvas&lt;/div&gt;
        &lt;div class=&quot;fs-desc&quot;&gt;They see the full DAG for this account. Entry (green ✓), Qualify (green ✓), Discovery nodes (blue, in progress). The connection arrow from Qualify → Discovery is solid, meaning the gate passed. Three discovery sub-cards are visible: Pain Extraction, Stakeholder Discovery, Solution Fit.&lt;/div&gt;
        &lt;div class=&quot;fs-sub&quot;&gt;🧠 &lt;strong&gt;Behind the scenes:&lt;/strong&gt; DAG renderer reads deal context graph → maps each stage&#x27;s &lt;code&gt;completion_status&lt;/code&gt; and &lt;code&gt;agent_output_available&lt;/code&gt; → renders accordingly. Realtime subscription active.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;flow-step&quot;&gt;
      &lt;div class=&quot;fs-num&quot; style=&quot;background:#2563eb&quot;&gt;2&lt;/div&gt;
      &lt;div class=&quot;fs-body&quot;&gt;
        &lt;div class=&quot;fs-title&quot;&gt;Rep clicks &quot;Pain Extraction&quot; card&lt;/div&gt;
        &lt;div class=&quot;fs-desc&quot;&gt;A two-panel modal slides in from the right. Left panel: navigation list with 4 sections — Overview, Pain Analysis, AI Recommendations, Integrations. Right panel: immediately shows the AI-generated pain summary from the last 3 transcripts.&lt;/div&gt;
        &lt;div class=&quot;fs-sub&quot;&gt;🧠 &lt;strong&gt;Behind the scenes:&lt;/strong&gt; Modal reads &lt;code&gt;deal_context.pain_layer&lt;/code&gt; from context graph → Discovery Agent&#x27;s output is already there → no LLM call needed for viewing, just rendering. Modal also checks which left-nav sections are available based on data completeness.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;flow-step&quot;&gt;
      &lt;div class=&quot;fs-num&quot; style=&quot;background:#2563eb&quot;&gt;3&lt;/div&gt;
      &lt;div class=&quot;fs-body&quot;&gt;
        &lt;div class=&quot;fs-title&quot;&gt;Rep navigates to &quot;AI Recommendations&quot; in the left nav&lt;/div&gt;
        &lt;div class=&quot;fs-desc&quot;&gt;Right panel shows: &quot;3 discovery questions for your next call&quot;, &quot;2 pain areas not yet quantified&quot;, &quot;Suggested stakeholder to engage: CFO&quot;. Each item has a &quot;Use this&quot; button or &quot;Edit&quot; option.&lt;/div&gt;
        &lt;div class=&quot;fs-sub&quot;&gt;🧠 &lt;strong&gt;Behind the scenes:&lt;/strong&gt; These recommendations are pre-generated by Discovery Agent based on: existing pain statements vs qualification framework gaps. Stored in &lt;code&gt;agent_output.discovery_recommendations&lt;/code&gt;.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;flow-step&quot;&gt;
      &lt;div class=&quot;fs-num&quot; style=&quot;background:#2563eb&quot;&gt;4&lt;/div&gt;
      &lt;div class=&quot;fs-body&quot;&gt;
        &lt;div class=&quot;fs-title&quot;&gt;Rep confirms the pain summary is accurate&lt;/div&gt;
        &lt;div class=&quot;fs-desc&quot;&gt;Clicks &quot;Confirm &amp; Complete&quot; button in modal header. Modal closes. Back on DAG: the &quot;Pain Extraction&quot; card snaps to green. If this was the last discovery sub-card needed, the Gate 7 diamond auto-evaluates.&lt;/div&gt;
        &lt;div class=&quot;fs-sub&quot;&gt;🧠 &lt;strong&gt;Behind the scenes:&lt;/strong&gt; &lt;code&gt;stage.pain_extraction.status = &#x27;confirmed&#x27;&lt;/code&gt; written to context graph → &lt;code&gt;stage.updated&lt;/code&gt; event → Gate 7 evaluates: all 3 discovery nodes confirmed? → YES → gate passes → Demo nodes unlock → Forecast Agent recalculates win probability → DAG re-renders in ~300ms.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;flow-step&quot; style=&quot;margin-bottom:0&quot;&gt;
      &lt;div class=&quot;fs-num&quot; style=&quot;background:#16a34a&quot;&gt;5&lt;/div&gt;
      &lt;div class=&quot;fs-body&quot;&gt;
        &lt;div class=&quot;fs-title&quot;&gt;Demo nodes unlock — Demo Agent pre-fires&lt;/div&gt;
        &lt;div class=&quot;fs-desc&quot;&gt;Demo card appears with a subtle &quot;✦ AI Ready&quot; pulse badge — the Demo Agent has already pre-generated the demo script using pain data from discovery. Rep can click the Demo card immediately and see their prepared script. They did not need to prompt anything.&lt;/div&gt;
        &lt;div class=&quot;fs-sub&quot;&gt;🧠 &lt;strong&gt;Behind the scenes:&lt;/strong&gt; Gate 7 pass event → Orchestrator triggers Demo Agent with context: &lt;code&gt;pain_statements, qualification_data, stakeholder_map&lt;/code&gt; → Demo Agent generates script → stores in &lt;code&gt;agent_output.demo_script&lt;/code&gt; → &lt;code&gt;stage.demo.agent_output_available = true&lt;/code&gt; → DAG shows pulse badge.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;callout callout-green&quot;&gt;
    &lt;strong&gt;The UX principle:&lt;/strong&gt; Agents work ahead of the user. By the time the rep finishes a stage and unlocks the next, the AI has already prepared the next stage&#x27;s outputs. The rep&#x27;s job is to &lt;em&gt;confirm, edit, and act&lt;/em&gt; — not to prompt or request. This is what makes it feel AI-native vs AI-bolted-on.
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ④ ENTRY POINTS ON DAG --&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-entry&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;How Different Entry Points Render on the DAG&lt;/h2&gt;
    &lt;p&gt;This is the key design challenge: when a deal enters via inbound call instead of assessment, the DAG should not show a broken or empty start. It should show a different visual state — honest about what&#x27;s known and unknown.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;grid g2&quot; style=&quot;margin-bottom:20px&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#f0fdf4;color:#16a34a&quot;&gt;📊&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Entry via Assessment (Full Context)&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;DAG renders with richest initial state&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;dag-wrap&quot; style=&quot;overflow:hidden;min-width:0&quot;&gt;
        &lt;div style=&quot;display:flex;gap:6px;align-items:center;flex-wrap:wrap&quot;&gt;
          &lt;div class=&quot;dc ph-entry st-done&quot; style=&quot;width:110px&quot;&gt;
            &lt;div class=&quot;status-dot&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;phase&quot; style=&quot;color:#64748b&quot;&gt;ENTRY&lt;/div&gt;
            &lt;div class=&quot;title&quot;&gt;Account Overview&lt;/div&gt;
            &lt;div class=&quot;agent&quot;&gt;✓ Assessment done&lt;/div&gt;
          &lt;/div&gt;
          &lt;div style=&quot;color:#cbd5e1;font-size:14px&quot;&gt;→&lt;/div&gt;
          &lt;div class=&quot;dc ph-qualify st-prog&quot; style=&quot;width:110px&quot;&gt;
            &lt;div class=&quot;status-dot&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;phase&quot; style=&quot;color:#16a34a&quot;&gt;QUALIFY&lt;/div&gt;
            &lt;div class=&quot;title&quot;&gt;Lead Scoring&lt;/div&gt;
            &lt;div class=&quot;agent&quot;&gt;⚡ Active&lt;/div&gt;
          &lt;/div&gt;
          &lt;div style=&quot;color:#cbd5e1;font-size:14px&quot;&gt;→&lt;/div&gt;
          &lt;div class=&quot;dc ph-discover st-none&quot; style=&quot;width:110px&quot;&gt;
            &lt;div class=&quot;status-dot&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;phase&quot; style=&quot;color:#2563eb&quot;&gt;DISCOVER&lt;/div&gt;
            &lt;div class=&quot;title&quot;&gt;Pain Extraction&lt;/div&gt;
            &lt;div class=&quot;agent&quot;&gt;◦ Locked&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;annotate&quot; style=&quot;margin-top:12px&quot;&gt;&lt;strong&gt;Confidence score: 87%&lt;/strong&gt; — All assessment fields present. Gate 1 has full data to evaluate. AI outputs from Qualification Agent are pre-loaded.&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#fff7ed;color:#ea580c&quot;&gt;📞&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Entry via Inbound Call (No Assessment)&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;DAG shows honest partial state&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;dag-wrap&quot; style=&quot;overflow:hidden;min-width:0&quot;&gt;
        &lt;div style=&quot;display:flex;gap:6px;align-items:center;flex-wrap:wrap&quot;&gt;
          &lt;div class=&quot;dc ph-entry&quot; style=&quot;width:110px;border-left-color:#f59e0b;outline:2px dashed #fde68a;outline-offset:2px&quot;&gt;
            &lt;div class=&quot;status-dot&quot; style=&quot;background:#f59e0b&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;phase&quot; style=&quot;color:#64748b&quot;&gt;ENTRY&lt;/div&gt;
            &lt;div class=&quot;title&quot;&gt;Account Overview&lt;/div&gt;
            &lt;div class=&quot;agent&quot; style=&quot;color:#f59e0b&quot;&gt;⚠ Enrichment only&lt;/div&gt;
          &lt;/div&gt;
          &lt;div style=&quot;color:#cbd5e1;font-size:14px&quot;&gt;→&lt;/div&gt;
          &lt;div class=&quot;dc ph-qualify&quot; style=&quot;width:110px;border-left-color:#f59e0b;opacity:.8&quot;&gt;
            &lt;div class=&quot;status-dot&quot; style=&quot;background:#f59e0b&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;phase&quot; style=&quot;color:#16a34a&quot;&gt;QUALIFY&lt;/div&gt;
            &lt;div class=&quot;title&quot;&gt;Lead Scoring&lt;/div&gt;
            &lt;div class=&quot;agent&quot; style=&quot;color:#f59e0b&quot;&gt;◦ Low confidence&lt;/div&gt;
          &lt;/div&gt;
          &lt;div style=&quot;color:#e2e8f0;font-size:14px&quot;&gt;- -&lt;/div&gt;
          &lt;div class=&quot;dc ph-discover st-none&quot; style=&quot;width:110px&quot;&gt;
            &lt;div class=&quot;status-dot&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;phase&quot; style=&quot;color:#2563eb&quot;&gt;DISCOVER&lt;/div&gt;
            &lt;div class=&quot;title&quot;&gt;Pain Extraction&lt;/div&gt;
            &lt;div class=&quot;agent&quot;&gt;🔒 Needs qualify&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;annotate&quot; style=&quot;margin-top:12px&quot;&gt;&lt;strong&gt;Confidence score: 41%&lt;/strong&gt; — Amber dashed outline signals &quot;enrichment data, not assessed&quot;. Assessment node shows as a floating task on the card: &quot;Complete assessment to increase confidence.&quot;&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#fffbeb;color:#b45309&quot;&gt;🤝&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Entry via Founder Introduction&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;Strategic flag + expedited DAG view&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;dag-wrap&quot; style=&quot;overflow:hidden;min-width:0&quot;&gt;
        &lt;div style=&quot;display:flex;gap:6px;align-items:center;flex-wrap:wrap&quot;&gt;
          &lt;div class=&quot;dc ph-entry&quot; style=&quot;width:110px;outline:2px solid #f59e0b;outline-offset:2px&quot;&gt;
            &lt;div class=&quot;status-dot&quot; style=&quot;background:#f59e0b&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;phase&quot; style=&quot;color:#64748b&quot;&gt;ENTRY&lt;/div&gt;
            &lt;div class=&quot;title&quot;&gt;Account Overview&lt;/div&gt;
            &lt;div class=&quot;agent&quot; style=&quot;color:#b45309&quot;&gt;⭐ Strategic deal&lt;/div&gt;
          &lt;/div&gt;
          &lt;div style=&quot;color:#f59e0b;font-size:14px&quot;&gt;→&lt;/div&gt;
          &lt;div class=&quot;dc ph-qualify st-prog&quot; style=&quot;width:110px;border-left-color:#f59e0b&quot;&gt;
            &lt;div class=&quot;status-dot&quot; style=&quot;background:#2563eb&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;phase&quot; style=&quot;color:#16a34a&quot;&gt;QUALIFY&lt;/div&gt;
            &lt;div class=&quot;title&quot;&gt;Fast-Track Qualify&lt;/div&gt;
            &lt;div class=&quot;agent&quot;&gt;⚡ Gate relaxed 7d&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;annotate&quot; style=&quot;margin-top:12px&quot;&gt;&lt;strong&gt;Founder mode ON:&lt;/strong&gt; A golden &quot;⭐ Strategic&quot; banner appears at top of DAG. Gate 1 shows amber with &quot;7-day grace&quot; label. Executive Agent card is visible and active (usually behind a flag).&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#eff6ff;color:#2563eb&quot;&gt;🔄&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Entry via Existing Customer (Expansion)&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;DAG pre-populated from prior deal&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;dag-wrap&quot; style=&quot;overflow:hidden;min-width:0&quot;&gt;
        &lt;div style=&quot;display:flex;gap:6px;align-items:center;flex-wrap:wrap&quot;&gt;
          &lt;div class=&quot;dc ph-entry st-done&quot; style=&quot;width:110px&quot;&gt;
            &lt;div class=&quot;status-dot&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;phase&quot; style=&quot;color:#64748b&quot;&gt;ENTRY&lt;/div&gt;
            &lt;div class=&quot;title&quot;&gt;Account Overview&lt;/div&gt;
            &lt;div class=&quot;agent&quot;&gt;✓ Prior contract&lt;/div&gt;
          &lt;/div&gt;
          &lt;div style=&quot;color:#16a34a;font-size:14px&quot;&gt;→&lt;/div&gt;
          &lt;div class=&quot;dc ph-qualify st-done&quot; style=&quot;width:110px&quot;&gt;
            &lt;div class=&quot;status-dot&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;phase&quot; style=&quot;color:#16a34a&quot;&gt;QUALIFY&lt;/div&gt;
            &lt;div class=&quot;title&quot;&gt;Expansion Qualify&lt;/div&gt;
            &lt;div class=&quot;agent&quot;&gt;✓ Imported&lt;/div&gt;
          &lt;/div&gt;
          &lt;div style=&quot;color:#16a34a;font-size:14px&quot;&gt;→&lt;/div&gt;
          &lt;div class=&quot;dc ph-discover st-prog&quot; style=&quot;width:110px&quot;&gt;
            &lt;div class=&quot;status-dot&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;phase&quot; style=&quot;color:#2563eb&quot;&gt;DISCOVER&lt;/div&gt;
            &lt;div class=&quot;title&quot;&gt;Expansion Needs&lt;/div&gt;
            &lt;div class=&quot;agent&quot;&gt;⚡ Active&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;annotate&quot; style=&quot;margin-top:12px&quot;&gt;&lt;strong&gt;Historical context imported:&lt;/strong&gt; Entry and Qualify nodes show green immediately (from prior deal data). &quot;Imported from [Deal Name]&quot; badge on each node. Stale fields (90+ days) shown with amber refresh indicator.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;callout callout-blue&quot;&gt;
    &lt;strong&gt;The DAG entry-point rule:&lt;/strong&gt; Confidence Score drives visual state. 90%+ = all nodes start clean and ready. 65–89% = nodes active but badges show source. 35–64% = amber dashed outlines, &quot;low confidence&quot; badges. Below 35% = deal created but Entry node shows a prominent &quot;Complete assessment&quot; task card before any other node is accessible.
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ⑤ ROLE VIEWS ON DAG --&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-roles&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;Role-Based DAG Views&lt;/h2&gt;
    &lt;p&gt;The same deal has a different DAG rendering depending on who is looking at it. This is not about hiding data — it&#x27;s about surfacing the right layer of information for each role&#x27;s job to be done.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div style=&quot;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:#92400e&quot;&gt;&lt;strong&gt;⚠️ Internal Tool Only:&lt;/strong&gt; RevenueOS has no client portal. Clients never access this platform. All external communication via email (Gmail/Outlook) only. No shared links, no external sharing.&lt;/div&gt;
  &lt;div style=&quot;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center&quot;&gt;
    &lt;span style=&quot;font-size:11px;color:#64748b;font-weight:600&quot;&gt;View as:&lt;/span&gt;
    &lt;span class=&quot;role-chip&quot; style=&quot;background:#f8fafc;color:#b45309;border-color:#fde68a&quot;&gt;📞 BDR&lt;/span&gt;
    &lt;span class=&quot;role-chip sel&quot; style=&quot;background:#f5f3ff;color:#7c3aed;border-color:#ddd6fe&quot;&gt;👤 Sales Rep&lt;/span&gt;
    &lt;span class=&quot;role-chip&quot; style=&quot;background:#f8fafc;color:#475569;border-color:#e2e8f0&quot;&gt;📊 Sales Manager&lt;/span&gt;
    &lt;span class=&quot;role-chip&quot; style=&quot;background:#f8fafc;color:#475569;border-color:#e2e8f0&quot;&gt;🤝 Founder&lt;/span&gt;
    &lt;span class=&quot;role-chip&quot; style=&quot;background:#f8fafc;color:#4f46e5;border-color:#c7d2fe&quot;&gt;📝 Agreement Reviewer&lt;/span&gt;
    &lt;span class=&quot;role-chip&quot; style=&quot;background:#f8fafc;color:#64748b;border-color:#e2e8f0&quot;&gt;⚙️ Admin (Config)&lt;/span&gt;
    &lt;span class=&quot;role-chip&quot; style=&quot;background:#f8fafc;color:#047857;border-color:#6ee7b7&quot;&gt;🤝 CS Handover&lt;/span&gt;
  &lt;/div&gt;

  &lt;div class=&quot;grid g2&quot; style=&quot;gap:12px&quot;&gt;
    &lt;div class=&quot;role-dag&quot;&gt;
      &lt;div class=&quot;rd-header&quot; style=&quot;background:#f5f3ff;border-bottom:1px solid #ddd6fe;color:#4c1d95&quot;&gt;
        👤 Sales Rep View
        &lt;span class=&quot;pill pv&quot; style=&quot;margin-left:4px&quot;&gt;EXECUTION FOCUS&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;rd-body&quot;&gt;
        &lt;div style=&quot;font-size:11px;color:#64748b;margin-bottom:10px;line-height:1.6&quot;&gt;Rep sees &lt;strong&gt;all stages for their own deals&lt;/strong&gt;. Focus is on what to do next — their current node pulses blue. Gates are visible. AI badge shows when output is ready to review.&lt;/div&gt;
        &lt;div class=&quot;rd-stages&quot;&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f0fdf4;color:#16a34a;border-color:#bbf7d0&quot;&gt;✓ Entry&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f0fdf4;color:#16a34a;border-color:#bbf7d0&quot;&gt;✓ Qualify&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#eff6ff;color:#2563eb;border-color:#bfdbfe&quot;&gt;⚡ Discovery&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;opacity:.6&quot;&gt;◦ Demo&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;opacity:.6&quot;&gt;◦ Propose&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;opacity:.6&quot;&gt;◦ Close&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;annotate&quot; style=&quot;margin-top:10px&quot;&gt;&lt;strong&gt;Unique to rep view:&lt;/strong&gt; &quot;Next best action&quot; banner at top of DAG. Gate blocking reason shown inline. Demo Coach score shown on demo node (own score only).&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;role-dag&quot;&gt;
      &lt;div class=&quot;rd-header&quot; style=&quot;background:#eff6ff;border-bottom:1px solid #bfdbfe;color:#1e40af&quot;&gt;
        📊 Sales Manager View
        &lt;span class=&quot;pill pb&quot; style=&quot;margin-left:4px&quot;&gt;OVERSIGHT FOCUS&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;rd-body&quot;&gt;
        &lt;div style=&quot;font-size:11px;color:#64748b;margin-bottom:10px;line-height:1.6&quot;&gt;Manager sees &lt;strong&gt;all deals across their team&lt;/strong&gt;. DAG shows a &quot;deal health&quot; overlay — each node shows a percentage instead of just status. Gate override button is visible on blocked gates. Coach score shown for all reps.&lt;/div&gt;
        &lt;div class=&quot;rd-stages&quot;&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f0fdf4;color:#16a34a;border-color:#bbf7d0&quot;&gt;✓ Entry (100%)&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f0fdf4;color:#16a34a;border-color:#bbf7d0&quot;&gt;✓ Qualify (87%)&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#eff6ff;color:#2563eb;border-color:#bfdbfe&quot;&gt;⚡ Discovery (63%)&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#fff5f5;color:#dc2626;border-color:#fca5a5&quot;&gt;🔒 Gate 7 BLOCKED&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;annotate&quot; style=&quot;margin-top:10px&quot;&gt;&lt;strong&gt;Unique to manager view:&lt;/strong&gt; &quot;Override&quot; button on blocked gates. Rep assignment shown on each card. Team comparison stats in bottom bar. Stale deal alerts (no activity 7+ days).&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;role-dag&quot;&gt;
      &lt;div class=&quot;rd-header&quot; style=&quot;background:#fffbeb;border-bottom:1px solid #fde68a;color:#78350f&quot;&gt;
        🤝 Founder / Executive View
        &lt;span class=&quot;pill py&quot; style=&quot;margin-left:4px&quot;&gt;STRATEGIC FOCUS&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;rd-body&quot;&gt;
        &lt;div style=&quot;font-size:11px;color:#64748b;margin-bottom:10px;line-height:1.6&quot;&gt;Founder sees &lt;strong&gt;only strategic accounts&lt;/strong&gt; (flagged as strategic or above deal size threshold). DAG shows a simplified 4-node view — Entry, Discovery Summary, Commercial Status, and Close. No individual stage detail — just deal health and their personal touch history.&lt;/div&gt;
        &lt;div class=&quot;rd-stages&quot;&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f0fdf4;color:#16a34a;border-color:#bbf7d0&quot;&gt;✓ Account Health&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#eff6ff;color:#2563eb;border-color:#bfdbfe&quot;&gt;⚡ Relationship&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#fff7ed;color:#ea580c;border-color:#fed7aa&quot;&gt;⚠ Commercial&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;opacity:.6&quot;&gt;◦ Close&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;annotate&quot; style=&quot;margin-top:10px&quot;&gt;&lt;strong&gt;Unique to founder view:&lt;/strong&gt; &quot;Last executive touch: 18 days ago ⚠️&quot; alert. One-click &quot;Log executive interaction&quot; from DAG. Personal relationship map overlay on stakeholder node.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;role-dag&quot;&gt;
      &lt;div class=&quot;rd-header&quot; style=&quot;background:#f8fafc;border-bottom:1px solid #e2e8f0;color:#475569&quot;&gt;
        🤝 CS Handover View
        &lt;span class=&quot;pill pgr&quot; style=&quot;margin-left:4px&quot;&gt;HANDOVER FOCUS&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;rd-body&quot;&gt;
        &lt;div style=&quot;font-size:11px;color:#64748b;margin-bottom:10px;line-height:1.6&quot;&gt;CS Handover persona sees &lt;strong&gt;post-win stages only&lt;/strong&gt;. All deal stages (Entry–Close) are visible but read-only. Only Won → Handover → Onboarding → Handoff are actionable.&lt;/div&gt;
        &lt;div class=&quot;rd-stages&quot;&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;font-size:9px&quot;&gt;🔒 Entry–Close (read-only)&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f0fdf4;color:#16a34a;border-color:#bbf7d0&quot;&gt;🏆 Won&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#eff6ff;color:#2563eb;border-color:#bfdbfe&quot;&gt;⚡ Handover Doc&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;opacity:.6&quot;&gt;◦ Onboarding Plan&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;opacity:.6&quot;&gt;◦ Handoff Email&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;annotate&quot; style=&quot;margin-top:10px&quot;&gt;&lt;strong&gt;Unique to CS Handover view:&lt;/strong&gt; Cannot see commercial data (pricing, discount). Can see all pain statements and stakeholder map. Handover document export (PDF) and handoff email draft (via Gmail/Outlook) prominently placed. &lt;em&gt;Internal tool only — no client portal access.&lt;/em&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;role-dag&quot;&gt;
      &lt;div class=&quot;rd-header&quot; style=&quot;background:#fffbeb;border-bottom:1px solid #fde68a;color:#78350f&quot;&gt;
        📞 BDR View
        &lt;span class=&quot;pill py&quot; style=&quot;margin-left:4px&quot;&gt;PIPELINE ENTRY&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;rd-body&quot;&gt;
        &lt;div style=&quot;font-size:11px;color:#64748b;margin-bottom:10px;line-height:1.6&quot;&gt;BDR sees &lt;strong&gt;Entry through Outreach stages only&lt;/strong&gt;. Discovery and beyond are locked and greyed. Focus is on sourcing, assessment, scoring, and initial outreach via email.&lt;/div&gt;
        &lt;div class=&quot;rd-stages&quot;&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f0fdf4;color:#16a34a;border-color:#bbf7d0&quot;&gt;✓ Entry&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f0fdf4;color:#16a34a;border-color:#bbf7d0&quot;&gt;✓ Assessment&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#eff6ff;color:#2563eb;border-color:#bfdbfe&quot;&gt;⚡ Lead Score&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#fffbeb;color:#b45309;border-color:#fde68a&quot;&gt;⬧ Gate 1&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;opacity:.6&quot;&gt;◦ Outreach&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;opacity:.4;font-size:9px&quot;&gt;🔒 Discovery (locked)&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;opacity:.4;font-size:9px&quot;&gt;🔒 Demo (locked)&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;annotate&quot; style=&quot;margin-top:10px&quot;&gt;&lt;strong&gt;Unique to BDR view:&lt;/strong&gt; Can draft outreach emails via Email Intelligence Agent. Cannot advance past Outreach. No gate override capability. Hands off to Sales Rep after Gate 1 passed.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;role-dag&quot;&gt;
      &lt;div class=&quot;rd-header&quot; style=&quot;background:#eef2ff;border-bottom:1px solid #c7d2fe;color:#3730a3&quot;&gt;
        📝 Agreement Reviewer View
        &lt;span class=&quot;pill&quot; style=&quot;background:#e0e7ff;color:#4338ca;border:1px solid #c7d2fe;margin-left:4px&quot;&gt;LEGAL FOCUS&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;rd-body&quot;&gt;
        &lt;div style=&quot;font-size:11px;color:#64748b;margin-bottom:10px;line-height:1.6&quot;&gt;Agreement Reviewer sees &lt;strong&gt;only Proposal → Legal stages&lt;/strong&gt;. All Entry–Demo stages are locked. Can review, redline, and approve contracts. No access to commercial pricing data.&lt;/div&gt;
        &lt;div class=&quot;rd-stages&quot;&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;font-size:9px&quot;&gt;🔒 Entry–Demo (locked)&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#fff7ed;color:#ea580c;border-color:#fed7aa&quot;&gt;⚡ Proposal&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#eff6ff;color:#2563eb;border-color:#bfdbfe&quot;&gt;⚡ Contract&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#eff6ff;color:#2563eb;border-color:#bfdbfe&quot;&gt;⚡ Review + Redline&lt;/div&gt;
          &lt;div class=&quot;rd-stage&quot; style=&quot;background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;opacity:.6&quot;&gt;◦ Legal Approved&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;annotate&quot; style=&quot;margin-top:10px&quot;&gt;&lt;strong&gt;Unique to Agreement Reviewer:&lt;/strong&gt; Redline version control on contract docs. Legal approval gate sign-off button. Can export contract review as PDF or send summary via email. Cannot see Assessment scores or commercial pricing.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;role-dag&quot;&gt;
      &lt;div class=&quot;rd-header&quot; style=&quot;background:#f8fafc;border-bottom:1px solid #e2e8f0;color:#475569&quot;&gt;
        ⚙️ Admin (Config) View
        &lt;span class=&quot;pill&quot; style=&quot;background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;margin-left:4px&quot;&gt;NO DAG&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;rd-body&quot;&gt;
        &lt;div style=&quot;font-size:11px;color:#64748b;margin-bottom:10px;line-height:1.6&quot;&gt;Admin has &lt;strong&gt;no DAG view&lt;/strong&gt;. Instead sees a configuration panel with system-level controls. No deal-level data visible.&lt;/div&gt;
        &lt;div style=&quot;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:9px;padding:12px;font-size:10px;color:#475569;line-height:1.8&quot;&gt;
          &lt;strong&gt;Config Panel replaces DAG:&lt;/strong&gt;&lt;br&gt;
          ⚙️ Module Config — activate/deactivate modules&lt;br&gt;
          🔒 Gate Config — strictness per stage&lt;br&gt;
          👥 Role &amp;amp; Team — user assignments&lt;br&gt;
          🔗 Integrations — credentials + webhooks&lt;br&gt;
          📋 Audit Log — all system events
        &lt;/div&gt;
        &lt;div class=&quot;annotate&quot; style=&quot;margin-top:10px&quot;&gt;&lt;strong&gt;Unique to Admin:&lt;/strong&gt; No deal data visible. Config changes take effect immediately. Audit log shows all config changes with timestamp and user.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ⑥ DEAL STATES &amp; REOPEN --&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-states&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;Deal States &amp; Reopen Flow in the DAG&lt;/h2&gt;
    &lt;p&gt;Deals don&#x27;t always move forward. They get blocked, go cold, get reopened, or regress. The DAG must represent all of these states visually — not just &quot;in pipeline&quot; or &quot;lost&quot;.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot; style=&quot;margin-bottom:20px&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#f8fafc&quot;&gt;🔄&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;All Possible Deal States on the DAG&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;table class=&quot;comp&quot;&gt;
      &lt;tr&gt;&lt;th&gt;State&lt;/th&gt;&lt;th&gt;DAG Visual&lt;/th&gt;&lt;th&gt;What Caused It&lt;/th&gt;&lt;th&gt;What Unlocks&lt;/th&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;🟢 Active / In Progress&lt;/td&gt;&lt;td&gt;Blue outline on current node. Preceding nodes green. Future nodes grey.&lt;/td&gt;&lt;td&gt;Normal deal progression&lt;/td&gt;&lt;td&gt;Rep action or agent output&lt;/td&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;✅ Stage Complete&lt;/td&gt;&lt;td&gt;Green outline, ✓ badge, connector arrow turns solid green&lt;/td&gt;&lt;td&gt;Human confirmation of stage&lt;/td&gt;&lt;td&gt;Downstream gate evaluates&lt;/td&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;🔒 Gate Blocked&lt;/td&gt;&lt;td&gt;Red diamond gate. Downstream nodes show lock icon. Banner: &quot;Gate blocked — see details&quot;&lt;/td&gt;&lt;td&gt;Gate evaluated, missing required data&lt;/td&gt;&lt;td&gt;Manager override or data completion&lt;/td&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;❄️ Dormant&lt;/td&gt;&lt;td&gt;Entire DAG desaturated. Grey banner: &quot;No activity 21+ days&quot;. Forecast badge shows &quot;At Risk&quot;&lt;/td&gt;&lt;td&gt;No events for 21+ days&lt;/td&gt;&lt;td&gt;New meeting, email, or rep manually reactivates&lt;/td&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;🔴 Blocked by Customer&lt;/td&gt;&lt;td&gt;Specific node shows red with &quot;Customer blocker&quot; tag. Blocker summary shown in card&lt;/td&gt;&lt;td&gt;Rep logged a customer-side blocker (procurement, legal, budget freeze)&lt;/td&gt;&lt;td&gt;Rep logs blocker resolution&lt;/td&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;🔁 Regressed&lt;/td&gt;&lt;td&gt;Node that regressed shows amber outline. Arrow between regressed node and previous shows dashed orange (going backward)&lt;/td&gt;&lt;td&gt;Manager triggered stage regression&lt;/td&gt;&lt;td&gt;Rep must re-complete the regressed stage&lt;/td&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;🔓 Reopened&lt;/td&gt;&lt;td&gt;Previously closed/blocked nodes show blue &quot;Reopened&quot; banner. History badge on node shows &quot;Reopened [date]&quot;&lt;/td&gt;&lt;td&gt;Manager used &quot;Reopen deal&quot; action&lt;/td&gt;&lt;td&gt;Orchestrator determines which agents re-run&lt;/td&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;🏆 Won&lt;/td&gt;&lt;td&gt;Entire DAG turns green. &quot;Won 🎉&quot; celebration banner. All nodes locked (read-only)&lt;/td&gt;&lt;td&gt;Contract signed event (DocuSign webhook)&lt;/td&gt;&lt;td&gt;CS Handover stage unlocks&lt;/td&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;💀 Lost&lt;/td&gt;&lt;td&gt;Entire DAG desaturated to grey. &quot;Lost&quot; red banner. Loss reason shown at top.&lt;/td&gt;&lt;td&gt;Rep marks as lost or inactivity threshold&lt;/td&gt;&lt;td&gt;Nothing — but all context preserved for future win-back&lt;/td&gt;&lt;/tr&gt;
      &lt;tr&gt;&lt;td&gt;📦 Archived&lt;/td&gt;&lt;td&gt;DAG hidden from default pipeline view. &quot;Archived&quot; grey badge. Accessible via search/filter only. All data preserved.&lt;/td&gt;&lt;td&gt;Admin or manager explicitly archives (&gt;90 days inactive post-lost, or duplicate detected)&lt;/td&gt;&lt;td&gt;Admin can unarchive — deal returns to Lost state for review&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;
  &lt;/div&gt;

  &lt;div class=&quot;grid g2&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#fff7ed;color:#ea580c&quot;&gt;🔓&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Deal Reopen Flow&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;What happens on the DAG when a blocked/lost deal is reopened&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;flow-step&quot;&gt;
        &lt;div class=&quot;fs-num&quot; style=&quot;background:#ef4444&quot;&gt;1&lt;/div&gt;
        &lt;div class=&quot;fs-body&quot;&gt;&lt;div class=&quot;fs-title&quot;&gt;Deal is Blocked / Lost&lt;/div&gt;&lt;div class=&quot;fs-desc&quot;&gt;DAG shows blocked or lost state. All forward progression halted. Context graph frozen (no new writes except audit log).&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;flow-step&quot;&gt;
        &lt;div class=&quot;fs-num&quot; style=&quot;background:#f59e0b&quot;&gt;2&lt;/div&gt;
        &lt;div class=&quot;fs-body&quot;&gt;&lt;div class=&quot;fs-title&quot;&gt;Manager clicks &quot;Reopen Deal&quot;&lt;/div&gt;&lt;div class=&quot;fs-desc&quot;&gt;A confirmation modal asks: &quot;What changed? (optional)&quot; and &quot;Which stage to reopen from?&quot; Manager selects or accepts AI recommendation.&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;flow-step&quot;&gt;
        &lt;div class=&quot;fs-num&quot; style=&quot;background:#7c3aed&quot;&gt;3&lt;/div&gt;
        &lt;div class=&quot;fs-body&quot;&gt;&lt;div class=&quot;fs-title&quot;&gt;Orchestrator runs Reopen Assessment&lt;/div&gt;&lt;div class=&quot;fs-desc&quot;&gt;Checks: what caused the block → which agents need to re-run → which context fields are stale (90+ days). Results in a &quot;Reopen Plan&quot; — a mini task list shown as a sidebar on the DAG.&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;flow-step&quot;&gt;
        &lt;div class=&quot;fs-num&quot; style=&quot;background:#2563eb&quot;&gt;4&lt;/div&gt;
        &lt;div class=&quot;fs-body&quot;&gt;&lt;div class=&quot;fs-title&quot;&gt;DAG renders Reopen State&lt;/div&gt;&lt;div class=&quot;fs-desc&quot;&gt;Re-entry stage node shows blue &quot;Reopened&quot; banner. Stale data fields show amber badges (&quot;Update needed&quot;). New context nodes (post-reopen) shown in slightly different shade to distinguish from original deal history.&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;flow-step&quot; style=&quot;margin-bottom:0&quot;&gt;
        &lt;div class=&quot;fs-num&quot; style=&quot;background:#16a34a&quot;&gt;5&lt;/div&gt;
        &lt;div class=&quot;fs-body&quot;&gt;&lt;div class=&quot;fs-title&quot;&gt;Rep resumes from reopened stage&lt;/div&gt;&lt;div class=&quot;fs-desc&quot;&gt;ALL prior context preserved — rep doesn&#x27;t start over. Only stale/missing fields need updating. Deal resumes from the exact node it was at. Previous completion history visible in node history panel.&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;❄️&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Cold Lead Reactivation&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;Account goes dormant, then re-engages — how DAG handles it&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;state-flow&quot;&gt;
        &lt;div class=&quot;sf-node&quot; style=&quot;background:#eff6ff;border-color:#bfdbfe;color:#1e40af&quot;&gt;Active Deal&lt;br&gt;&lt;span style=&quot;font-size:9px;font-weight:400&quot;&gt;Qualify stage&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;sf-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;sf-node&quot; style=&quot;background:#f8fafc;border-color:#e2e8f0;color:#64748b;opacity:.7&quot;&gt;Dormant&lt;br&gt;&lt;span style=&quot;font-size:9px;font-weight:400&quot;&gt;30 days silence&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;sf-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;sf-node&quot; style=&quot;background:#fffbeb;border-color:#fde68a;color:#78350f&quot;&gt;Reactivated&lt;br&gt;&lt;span style=&quot;font-size:9px;font-weight:400&quot;&gt;New email in&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;sf-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;sf-node&quot; style=&quot;background:#f0fdf4;border-color:#bbf7d0;color:#14532d&quot;&gt;Resumed&lt;br&gt;&lt;span style=&quot;font-size:9px;font-weight:400&quot;&gt;Qualify +check&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-o&quot;&gt;&lt;/div&gt;Account sends new email after 45 days of silence&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;Email Intelligence Agent detects re-engagement signal&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;Orchestrator fires &lt;code&gt;deal.reactivate&lt;/code&gt; event&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;Context freshness check: budget/timeline data is 45 days old → flagged amber&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;DAG shows deal at exact prior stage, but Qualify node has amber &quot;Verify budget &amp; timeline&quot; task badge&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Rep gets notification: &quot;Account re-engaged — review 2 stale data points before advancing&quot;&lt;/div&gt;
      &lt;div class=&quot;annotate&quot; style=&quot;margin-top:10px&quot;&gt;&lt;strong&gt;Key UX principle:&lt;/strong&gt; Rep sees where they left off, with clear callouts for what changed. No full restart. The work done previously is respected and preserved.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ⑦ MOBILE &amp; NAVIGATION --&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-mobile&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;Mobile &amp; Alternative Navigation Patterns&lt;/h2&gt;
    &lt;p&gt;An infinite canvas DAG works great on desktop. On mobile, reps need a different entry point into the same data. The system must offer multiple navigation patterns — DAG is the primary view, but not the only one.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;grid g3&quot; style=&quot;margin-bottom:20px&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;🖥️&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Desktop — DAG Canvas&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;Primary view. Full spatial navigation.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Full infinite canvas with zoom/pan&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;All nodes + gates + connectors visible&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Click node → two-panel modal&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Best for: deal planning, gate review, stage overview&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#eff6ff;color:#2563eb&quot;&gt;📱&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Mobile — Stage List&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;Vertical card list, same data.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;Collapsed DAG into ordered vertical list&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;Same status colours (green/blue/grey/red)&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;Tap card → full-screen modal (no split)&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-o&quot;&gt;&lt;/div&gt;Gate shown as horizontal divider with status badge&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Best for: quick status check, logging a meeting, confirming AI output&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#f0fdf4;color:#16a34a&quot;&gt;🔍&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Search / Command View&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;Jump directly to any stage in any deal.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;⌘K command palette — search by deal, stage, or content&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;&quot;Open Pain Extraction for Acme Corp&quot; → direct to modal&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;Bypasses DAG navigation for power users&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Best for: reps managing 10+ active deals&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#fffbeb;color:#b45309&quot;&gt;🧭&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Navigation Hierarchy — How a Rep Gets Anywhere&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;flow-step&quot;&gt;
      &lt;div class=&quot;fs-num&quot; style=&quot;background:#0f172a&quot;&gt;🏠&lt;/div&gt;
      &lt;div class=&quot;fs-body&quot;&gt;&lt;div class=&quot;fs-title&quot;&gt;Home Dashboard&lt;/div&gt;&lt;div class=&quot;fs-desc&quot;&gt;Pipeline overview — all active deals as mini-DAG thumbnails. Red/blue/green status at a glance. Click any deal thumbnail → opens deal DAG canvas.&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;flow-step&quot;&gt;
      &lt;div class=&quot;fs-num&quot; style=&quot;background:#7c3aed&quot;&gt;📊&lt;/div&gt;
      &lt;div class=&quot;fs-body&quot;&gt;&lt;div class=&quot;fs-title&quot;&gt;Deal DAG Canvas&lt;/div&gt;&lt;div class=&quot;fs-desc&quot;&gt;The primary deal view. All stages, gates, connectors. Status coloured. Current stage pulses. &quot;Next best action&quot; banner at top.&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;flow-step&quot;&gt;
      &lt;div class=&quot;fs-num&quot; style=&quot;background:#2563eb&quot;&gt;🃏&lt;/div&gt;
      &lt;div class=&quot;fs-body&quot;&gt;&lt;div class=&quot;fs-title&quot;&gt;Stage Modal (click a node)&lt;/div&gt;&lt;div class=&quot;fs-desc&quot;&gt;Two-panel modal: left nav (Summary, Progress, Screens, AI Agent, Integrations) + right content. All AI outputs, action items, and data entry here. This is where 80% of rep work happens.&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;flow-step&quot; style=&quot;margin-bottom:0&quot;&gt;
      &lt;div class=&quot;fs-num&quot; style=&quot;background:#16a34a&quot;&gt;📤&lt;/div&gt;
      &lt;div class=&quot;fs-body&quot;&gt;&lt;div class=&quot;fs-title&quot;&gt;Output Actions&lt;/div&gt;&lt;div class=&quot;fs-desc&quot;&gt;From within any modal: &lt;strong&gt;Export → PDF&lt;/strong&gt; or &lt;strong&gt;Send via Email (Gmail/Outlook only)&lt;/strong&gt;. No &quot;Share link&quot; or &quot;Share with client&quot; options exist — RevenueOS is an internal tool only. All external client communication happens via email. No client portal, no shared links to the platform.&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ⑧ JUSTIFY TO DEVS &amp; STAKEHOLDERS --&gt;
&lt;div class=&quot;sec&quot; id=&quot;sec-justify&quot;&gt;
  &lt;div class=&quot;sec-hd&quot;&gt;
    &lt;h2&gt;How to Justify the DAG Architecture&lt;/h2&gt;
    &lt;p&gt;As the designer, your job is to make this undeniable. Here&#x27;s exactly what to show each audience — devs, product stakeholders, and business leadership — and how to frame the DAG as the right call.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;grid g2&quot; style=&quot;margin-bottom:20px&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#f8fafc;color:#475569&quot;&gt;💻&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;For Developers&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;Translate design to technical requirements&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;&lt;strong&gt;DAG = data-driven render, not hardcoded layout.&lt;/strong&gt; Every card is a DB row. Position, status, phase, connections — all from data. &quot;If the data changes, the DAG changes.&quot;&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;&lt;strong&gt;No custom graph engine needed.&lt;/strong&gt; Cards are divs with absolute positioning + CSS transform. Connections are SVG &amp;lt;path&amp;gt; bezier curves. Already built in the existing HTML file.&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;&lt;strong&gt;Realtime is a subscription, not polling.&lt;/strong&gt; Supabase Realtime on &lt;code&gt;deal_stages&lt;/code&gt; table. When a record updates, the affected card re-renders. Single WebSocket for all cards in a deal.&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;&lt;strong&gt;Role filter is a query param.&lt;/strong&gt; &lt;code&gt;GET /deal/:id/stages?role=manager&lt;/code&gt; returns only the stages that role can see. The frontend doesn&#x27;t need to know role rules — the API enforces them.&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;&lt;strong&gt;Modal is a shared component.&lt;/strong&gt; One modal component, different content rendered per node type (stage vs gate). Left nav items come from a config object per stage — same pattern across all 16 stages.&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#f5f3ff;color:#7c3aed&quot;&gt;📊&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;For Product Stakeholders&lt;/div&gt;&lt;div class=&quot;cs&quot;&gt;Connect design to product goals&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;&lt;strong&gt;The DAG makes governance visible without making it annoying.&lt;/strong&gt; A rep can see a blocked gate from across the canvas — no alert needed, no modal interrupt. They naturally fix the blocker when they&#x27;re ready.&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;&lt;strong&gt;AI outputs have a home.&lt;/strong&gt; In a kanban, where does the AI demo script live? In a list view? The DAG gives every AI agent output a physical location the rep can find intuitively.&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;&lt;strong&gt;Context confidence is spatial.&lt;/strong&gt; High confidence deal = bright, clear DAG. Low confidence = amber, muted. At a glance in a pipeline dashboard, managers can spot which deals need attention without reading a single number.&lt;/div&gt;
      &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot&quot;&gt;&lt;/div&gt;&lt;strong&gt;Multiple entry points are handled elegantly.&lt;/strong&gt; The DAG starts at different nodes depending on how the deal entered — no &quot;broken flow&quot; feeling. Assessment-less deals look intentionally different, not broken.&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot; style=&quot;margin-bottom:16px&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#0f172a;color:#fff&quot;&gt;🎯&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;The One-Slide Argument — For Business Leadership&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;grid g3&quot; style=&quot;margin-top:4px&quot;&gt;
      &lt;div style=&quot;background:#fff5f5;border:1px solid #fca5a5;border-radius:10px;padding:14px&quot;&gt;
        &lt;div style=&quot;font-size:10px;font-weight:800;color:#dc2626;margin-bottom:8px&quot;&gt;❌ CURRENT REALITY (Manual CRM)&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#64748b;line-height:1.7&quot;&gt;
          Rep fills out 20 fields manually. Manager has no idea if discovery was real or assumed. Demo script is last year&#x27;s deck. Proposal takes 3 days. Gate is a meeting that may or may not happen. Win rate: 18%.
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px&quot;&gt;
        &lt;div style=&quot;font-size:10px;font-weight:800;color:#b45309;margin-bottom:8px&quot;&gt;⚠️ TRADITIONAL AI BOLTED ON&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#64748b;line-height:1.7&quot;&gt;
          Same CRM workflow + a ChatGPT sidebar. Rep still manually enters data. AI suggests emails but doesn&#x27;t know deal context. Gates still manual. Manager still guesses. AI adds 20% velocity. Win rate: 22%.
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px&quot;&gt;
        &lt;div style=&quot;font-size:10px;font-weight:800;color:#16a34a;margin-bottom:8px&quot;&gt;✓ REVENUOUS — AI-NATIVE DAG&lt;/div&gt;
        &lt;div style=&quot;font-size:11px;color:#64748b;line-height:1.7&quot;&gt;
          DAG shows every dependency. Agents pre-generate outputs at every stage. Gates enforce real data, not checkbox theatre. Manager sees deal health spatially. Rep never hunts for information. Win rate target: 35%+.
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;callout callout-purple&quot;&gt;
    &lt;strong&gt;Your design justification in one line:&lt;/strong&gt; &quot;The DAG is the only UI pattern that can show a rep where they are, what&#x27;s blocking them, what the AI has prepared, and what they need to do next — all without clicking through multiple screens or asking anyone.&quot; Every other pattern forces a choice between context and action. The DAG gives both, spatially.
  &lt;/div&gt;

  &lt;div class=&quot;card&quot; style=&quot;margin-top:16px&quot;&gt;
    &lt;div class=&quot;card-hd&quot;&gt;&lt;div class=&quot;ic&quot; style=&quot;background:#f0fdf4;color:#16a34a&quot;&gt;✅&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;Designer&#x27;s Handoff Checklist — What to Give the Developer&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;grid g2&quot; style=&quot;margin-top:4px&quot;&gt;
      &lt;div&gt;
        &lt;div style=&quot;font-size:10px;font-weight:700;color:#7c3aed;margin-bottom:8px&quot;&gt;STATIC SPECS&lt;/div&gt;
        &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Node size, spacing, and phase layout grid (Figma)&lt;/div&gt;
        &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Connector path formulas (bezier control points per row)&lt;/div&gt;
        &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Status states × phase combinations (visual matrix)&lt;/div&gt;
        &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Gate diamond spec (clip-path, colours per state)&lt;/div&gt;
        &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Modal left-nav structure per node type&lt;/div&gt;
      &lt;/div&gt;
      &lt;div&gt;
        &lt;div style=&quot;font-size:10px;font-weight:700;color:#7c3aed;margin-bottom:8px&quot;&gt;DYNAMIC SPECS&lt;/div&gt;
        &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Data → visual state mapping table (confidence score → colours)&lt;/div&gt;
        &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Role × visible nodes matrix (who sees what)&lt;/div&gt;
        &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Entry point → initial DAG state (4 entry type specs)&lt;/div&gt;
        &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Deal state transitions (9 states × trigger → visual result)&lt;/div&gt;
        &lt;div class=&quot;rb&quot;&gt;&lt;div class=&quot;dot dot-g&quot;&gt;&lt;/div&gt;Reopen flow wireframe (what changes vs what stays)&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;annotate&quot; style=&quot;margin-top:12px&quot;&gt;
      &lt;strong&gt;The working prototype (RevenueOS_DAG.html) IS the developer spec.&lt;/strong&gt; Every animation, card size, connector curve, gate diamond, modal layout, and status colour is already implemented. The developer needs to replace static JS data with API calls — the rendering logic is done. Frame this as: &quot;I&#x27;ve built the full interactive prototype. You&#x27;re extracting the component library from it, not designing from scratch.&quot;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;/div&gt;&lt;!-- /page --&gt;
