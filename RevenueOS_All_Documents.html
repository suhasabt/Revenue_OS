&lt;title&gt;BeeForce EWFM — Assessment&lt;/title&gt;
&lt;style&gt;
@import url(&#x27;https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&amp;display=swap&#x27;);

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:&#x27;DM Sans&#x27;,-apple-system,system-ui,sans-serif;background:#f4f6fb;color:#1e293b;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── View system ── */
.view{display:none;min-height:100vh;animation:fadeIn .3s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── Shared header ── */
.topbar{background:#fff;border-bottom:1px solid #e8ecf4;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,#1a56db,#7c3aed);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800}
.logo-text{font-size:14px;font-weight:800;color:#0f172a}
.logo-text span{color:#1a56db}
.top-right{display:flex;align-items:center;gap:10px}
.role-badge{background:#eff6ff;color:#1d4ed8;font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;letter-spacing:.3px;text-transform:uppercase}
.prog-text{font-size:11px;color:#64748b;font-weight:600}

/* ── Progress bar ── */
.prog-bar-wrap{height:3px;background:#e8ecf4;position:sticky;top:56px;z-index:99}
.prog-bar{height:3px;background:linear-gradient(90deg,#1a56db,#7c3aed);width:0%;transition:width .4s ease}

/* ═══════════════════════════════
   VIEW 1 — LANDING (Link Entry)
═══════════════════════════════ */
#v-landing{background:#f4f6fb}
.landing-wrap{max-width:580px;margin:0 auto;padding:48px 24px}
.fomo-banner{background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.fomo-left{display:flex;align-items:center;gap:10px}
.fomo-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.fomo-label{font-size:11px;font-weight:700;color:#a5b4fc;letter-spacing:.5px;text-transform:uppercase}
.fomo-timer{font-size:18px;font-weight:800;color:#fff;letter-spacing:2px;font-variant-numeric:tabular-nums}

.landing-card{background:#fff;border-radius:18px;border:1px solid #e8ecf4;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.landing-hero{background:linear-gradient(135deg,#f8f9ff 0%,#eff4ff 100%);padding:32px 32px 24px;border-bottom:1px solid #e8ecf4}
.land-company{font-size:10px;font-weight:800;color:#1a56db;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.land-company::before{content:&#x27;&#x27;;width:16px;height:2px;background:#1a56db;border-radius:2px}
.land-title{font-size:22px;font-weight:800;color:#0f172a;line-height:1.3;margin-bottom:10px}
.land-desc{font-size:12px;color:#64748b;line-height:1.7}

.assess-type-section{padding:24px 32px;border-bottom:1px solid #f1f5f9}
.ast-label{font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:.7px;text-transform:uppercase;margin-bottom:12px}
.ast-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.ast-btn{border:2px solid #e2e8f0;border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .18s;background:#fff}
.ast-btn:hover{border-color:#1a56db;background:#eff6ff}
.ast-btn.sel{border-color:#1a56db;background:#eff6ff}
.ast-btn .ab-icon{font-size:20px;margin-bottom:6px}
.ast-btn .ab-name{font-size:11px;font-weight:700;color:#0f172a}
.ast-btn .ab-qs{font-size:9px;color:#94a3b8;margin-top:2px}
.ast-btn .ab-time{font-size:9px;font-weight:600;color:#1a56db;margin-top:4px}
.ast-btn.sel .ab-name{color:#1a56db}

.land-meta{padding:20px 32px;border-bottom:1px solid #f1f5f9;display:grid;grid-template-columns:1fr 1fr 1fr;gap:0}
.lm-item{text-align:center;padding:0 12px;border-right:1px solid #f1f5f9}
.lm-item:last-child{border:none}
.lm-val{font-size:16px;font-weight:800;color:#0f172a}
.lm-key{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

.land-cta{padding:24px 32px}
.ai-tag{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;font-size:11px;color:#15803d;margin-bottom:16px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.ai-tag strong{color:#14532d}
.btn-start{width:100%;padding:15px;background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:opacity .15s}
.btn-start:hover{opacity:.92}
.qr-link{text-align:center;margin-top:12px;font-size:11px;color:#94a3b8;cursor:pointer}
.qr-link:hover{color:#1a56db}

/* ═══════════════════════════════
   VIEW 2 — DETAILS
═══════════════════════════════ */
#v-details{background:#f4f6fb}
.details-wrap{max-width:560px;margin:0 auto;padding:40px 24px}
.step-header{margin-bottom:28px}
.step-label{font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:.7px;text-transform:uppercase;margin-bottom:6px}
.step-title{font-size:20px;font-weight:800;color:#0f172a;margin-bottom:6px}
.step-sub{font-size:12px;color:#64748b;line-height:1.6}
.form-card{background:#fff;border:1px solid #e8ecf4;border-radius:16px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.form-row{margin-bottom:18px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
label{display:block;font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
input,select{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:12px;color:#1e293b;font-family:inherit;background:#fff;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.08)}
.ai-detect{background:#f5f3ff;border:1px solid #ddd6fe;border-radius:8px;padding:10px 14px;font-size:11px;color:#6d28d9;margin-bottom:20px;display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.btn-next{width:100%;padding:13px;background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-next:hover{opacity:.9}
.privacy-note{text-align:center;font-size:10px;color:#94a3b8;margin-top:12px}

/* ═══════════════════════════════
   VIEW 3 — ASSESSMENT
═══════════════════════════════ */
#v-assess{background:#f4f6fb}
.assess-container{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 59px);align-items:start}

/* Sidebar */
.assess-sidebar{background:#fff;border-right:1px solid #e8ecf4;padding:24px 0;position:sticky;top:59px;max-height:calc(100vh - 59px);overflow-y:auto}
.sb-intro{padding:0 20px 16px;border-bottom:1px solid #f1f5f9}
.sb-company{font-size:9px;font-weight:800;color:#1a56db;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.sb-title{font-size:12px;font-weight:700;color:#0f172a;line-height:1.4}
.sb-prog{margin-top:10px}
.sb-prog-nums{display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;margin-bottom:4px}
.sb-prog-bar{height:4px;background:#f1f5f9;border-radius:4px}
.sb-prog-fill{height:4px;background:linear-gradient(90deg,#1a56db,#7c3aed);border-radius:4px;width:0%;transition:width .3s}

.sb-sections{padding:8px 0}
.sb-sec{padding:8px 20px;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sb-sec:hover{background:#f8f9ff}
.sb-sec.active{background:#eff4ff}
.sb-sec-name{font-size:11px;font-weight:600;color:#475569}
.sb-sec.active .sb-sec-name{color:#1a56db;font-weight:700}
.sb-sec-done{font-size:9px;color:#94a3b8;white-space:nowrap}
.sb-sec.all-done .sb-sec-name{color:#16a34a}
.sb-sec.all-done .sb-sec-done{color:#16a34a}
.sb-check{width:16px;height:16px;border-radius:50%;border:2px solid #e2e8f0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px}
.sb-sec.all-done .sb-check{background:#16a34a;border-color:#16a34a;color:#fff}
.sb-sec.active .sb-check{border-color:#1a56db}

/* Main assessment area */
.assess-main{padding:32px}
.assess-header{background:#fff;border:1px solid #e8ecf4;border-radius:16px;padding:22px 26px;margin-bottom:24px}
.ah-company{font-size:10px;font-weight:800;color:#1a56db;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.ah-title{font-size:18px;font-weight:800;color:#0f172a;margin-bottom:8px}
.ah-desc{font-size:11px;color:#64748b;line-height:1.6;margin-bottom:14px}
.ah-meta{display:flex;gap:20px}
.ah-chip{background:#f8f9ff;border:1px solid #e2e8f0;border-radius:7px;padding:5px 10px;font-size:10px;color:#475569;display:flex;align-items:center;gap:5px}
.ah-chip strong{color:#0f172a;font-weight:700}

/* Sections */
.assess-section{background:#fff;border:1px solid #e8ecf4;border-radius:14px;margin-bottom:16px;overflow:hidden}
.sec-header{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f8fafc;cursor:pointer}
.sec-title{font-size:13px;font-weight:700;color:#0f172a}
.sec-tag{font-size:9px;color:#94a3b8;font-weight:600;letter-spacing:.3px}
.sec-prog{font-size:9px;font-weight:700;color:#1a56db}

/* Question rows */
.q-row{padding:14px 22px;border-bottom:1px solid #f8fafc;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.q-row:last-child{border:none}
.q-left{flex:1}
.q-name{font-size:12px;font-weight:600;color:#1e293b;margin-bottom:3px}
.q-desc{font-size:10px;color:#94a3b8;line-height:1.4}
.q-choices{display:flex;gap:6px;flex-shrink:0}
.choice-btn{padding:6px 11px;border-radius:7px;font-size:9px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .15s;white-space:nowrap}
.choice-btn:hover{opacity:.85;transform:translateY(-1px)}
.c-no{background:#fff5f5;color:#dc2626;border-color:#fca5a5}
.c-no.sel{background:#dc2626;color:#fff;border-color:#dc2626}
.c-part{background:#fffbeb;color:#b45309;border-color:#fde68a}
.c-part.sel{background:#d97706;color:#fff;border-color:#d97706}
.c-full{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0}
.c-full.sel{background:#16a34a;color:#fff;border-color:#16a34a}

/* Footer bar */
.assess-footer{background:#fff;border-top:1px solid #e8ecf4;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;bottom:0;z-index:99}
.af-count{font-size:12px;color:#64748b}
.af-count strong{color:#0f172a}
.af-warn{font-size:10px;color:#f59e0b;font-weight:600}
.btn-submit{padding:11px 28px;background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;opacity:.4;pointer-events:none;transition:all .2s}
.btn-submit.ready{opacity:1;pointer-events:all}

/* ═══════════════════════════════
   VIEW 4 — RESULTS
═══════════════════════════════ */
#v-results{background:#f4f6fb}
.results-wrap{max-width:720px;margin:0 auto;padding:40px 24px}
.result-hero{background:linear-gradient(135deg,#0f172a,#1e1b4b);border-radius:20px;padding:36px;margin-bottom:24px;color:#fff;position:relative;overflow:hidden}
.rh-bg{position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:rgba(124,58,237,.2);border-radius:50%}
.rh-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:6px 12px;font-size:9px;font-weight:800;letter-spacing:.8px;color:#a5b4fc;text-transform:uppercase;display:inline-block;margin-bottom:16px}
.rh-title{font-size:22px;font-weight:800;margin-bottom:6px}
.rh-sub{font-size:12px;color:#94a3b8;margin-bottom:24px;line-height:1.6}
.score-ring{display:flex;align-items:center;gap:28px;flex-wrap:wrap}
.ring-wrap{position:relative;width:110px;height:110px;flex-shrink:0}
.ring-svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:8}
.ring-fg{fill:none;stroke:url(#ringGrad);stroke-width:8;stroke-linecap:round;stroke-dasharray:283;stroke-dashoffset:180;transition:stroke-dashoffset 1.5s ease}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:24px;font-weight:800;color:#fff}
.ring-word{font-size:9px;color:#94a3b8;font-weight:600;margin-top:1px}
.score-meta{flex:1;min-width:200px}
.sm-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.sm-row:last-child{border:none}
.sm-key{font-size:11px;color:#94a3b8}
.sm-val{font-size:11px;font-weight:700;color:#fff}

.section-scores{background:#fff;border:1px solid #e8ecf4;border-radius:16px;padding:24px;margin-bottom:16px}
.ss-title{font-size:13px;font-weight:700;color:#0f172a;margin-bottom:16px}
.ss-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.ss-row:last-child{margin:0}
.ss-name{font-size:11px;color:#475569;width:180px;flex-shrink:0}
.ss-bar-wrap{flex:1;height:7px;background:#f1f5f9;border-radius:4px}
.ss-bar{height:7px;border-radius:4px;transition:width 1s ease}
.ss-pct{font-size:10px;font-weight:700;width:34px;text-align:right}

.result-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.ra-btn{border-radius:12px;padding:16px;text-align:center;cursor:pointer;border:1.5px solid;transition:all .18s}
.ra-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.ra-btn .rab-icon{font-size:22px;margin-bottom:8px}
.ra-btn .rab-title{font-size:12px;font-weight:700}
.ra-btn .rab-sub{font-size:10px;color:#94a3b8;margin-top:2px}
.ra-primary{background:linear-gradient(135deg,#1a56db,#7c3aed);border-color:transparent;color:#fff}
.ra-primary .rab-sub{color:rgba(255,255,255,.7)}
.ra-secondary{background:#fff;border-color:#e2e8f0;color:#0f172a}

.next-steps{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:18px;font-size:11px;color:#14532d;line-height:1.7}
.next-steps strong{font-size:12px;color:#052e16}

/* ═══════════════════════════════
   VIEW 0 — TYPE SELECTOR (Admin)
═══════════════════════════════ */
#v-admin{background:#f4f6fb}
.admin-wrap{max-width:700px;margin:0 auto;padding:40px 24px}
.admin-hero{margin-bottom:28px}
.admin-title{font-size:20px;font-weight:800;color:#0f172a;margin-bottom:6px}
.admin-sub{font-size:12px;color:#64748b;line-height:1.6}
.admin-tabs{display:flex;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:4px;gap:4px;margin-bottom:20px}
.at-tab{flex:1;padding:9px;text-align:center;font-size:11px;font-weight:600;color:#64748b;border-radius:8px;cursor:pointer;transition:all .15s}
.at-tab.active{background:#1a56db;color:#fff;font-weight:700}
.config-card{background:#fff;border:1px solid #e8ecf4;border-radius:16px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.cf-section{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #f1f5f9}
.cf-section:last-child{border:none;margin:0;padding:0}
.cf-label{font-size:9px;font-weight:800;color:#94a3b8;letter-spacing:.7px;text-transform:uppercase;margin-bottom:10px}
.type-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tc{border:2px solid #e2e8f0;border-radius:11px;padding:14px;cursor:pointer;transition:all .15s;text-align:center}
.tc:hover,.tc.sel{border-color:#1a56db;background:#eff4ff}
.tc-name{font-size:11px;font-weight:700;color:#0f172a;margin-bottom:2px}
.tc-qs{font-size:9px;color:#94a3b8}
.tc-time{font-size:9px;font-weight:600;color:#1a56db;margin-top:4px}
.tc.sel .tc-name{color:#1a56db}
.send-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.so-btn{border:1.5px solid #e2e8f0;border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px}
.so-btn:hover,.so-btn.sel{border-color:#1a56db;background:#eff4ff}
.so-icon{font-size:20px}
.so-text .so-name{font-size:11px;font-weight:700;color:#0f172a}
.so-text .so-sub{font-size:9px;color:#94a3b8;margin-top:1px}
.inline-form{display:grid;gap:12px}
.if-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.preview-link{background:#f8f9ff;border:1.5px dashed #a5b4fc;border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.pl-url{font-size:10px;color:#4f46e5;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-copy{font-size:9px;font-weight:700;color:#1a56db;cursor:pointer;white-space:nowrap;padding:4px 8px;background:#eff4ff;border-radius:6px}
.fomo-config{display:flex;align-items:center;gap:10px;margin-top:8px}
.fomo-config select{width:auto;flex:0}
.fomo-config label{margin:0;font-size:11px;color:#475569;font-weight:500;text-transform:none;letter-spacing:0}
.btn-send{width:100%;padding:13px;background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}

/* ── Misc ── */
.spacer{height:20px}
.hidden{display:none}
.nav-demo{background:#0f172a;padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.nav-demo span{font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
.nd-btn{padding:5px 12px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid #334155;color:#94a3b8;background:transparent;transition:all .15s}
.nd-btn:hover,.nd-btn.active{background:#1a56db;color:#fff;border-color:#1a56db}
&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;

&lt;!-- Demo nav switcher --&gt;
&lt;div class=&quot;nav-demo&quot;&gt;
  &lt;span&gt;Demo views →&lt;/span&gt;
  &lt;button class=&quot;nd-btn&quot; onclick=&quot;showView(&#x27;v-admin&#x27;)&quot;&gt;⚙ Admin: Create Assessment&lt;/button&gt;
  &lt;button class=&quot;nd-btn active&quot; onclick=&quot;showView(&#x27;v-landing&#x27;)&quot;&gt;📧 Client: Link Landing&lt;/button&gt;
  &lt;button class=&quot;nd-btn&quot; onclick=&quot;showView(&#x27;v-details&#x27;)&quot;&gt;👤 Client: Fill Details&lt;/button&gt;
  &lt;button class=&quot;nd-btn&quot; onclick=&quot;showView(&#x27;v-assess&#x27;)&quot;&gt;📋 Client: Take Assessment&lt;/button&gt;
  &lt;button class=&quot;nd-btn&quot; onclick=&quot;showView(&#x27;v-results&#x27;)&quot;&gt;📊 Client: View Results&lt;/button&gt;
&lt;/div&gt;

&lt;!-- ══════════════════════════════════════════
     VIEW 0 — ADMIN: Create &amp; Send Assessment
══════════════════════════════════════════ --&gt;
&lt;div class=&quot;view&quot; id=&quot;v-admin&quot;&gt;
  &lt;div class=&quot;topbar&quot;&gt;
    &lt;div class=&quot;logo&quot;&gt;&lt;div class=&quot;logo-mark&quot;&gt;B&lt;/div&gt;&lt;div class=&quot;logo-text&quot;&gt;Bee&lt;span&gt;Force&lt;/span&gt; RevenueOS&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;top-right&quot;&gt;&lt;span class=&quot;role-badge&quot;&gt;Admin — Create Assessment&lt;/span&gt;&lt;/div&gt;
  &lt;/div&gt;

    &lt;!-- Actions --&gt;
    &lt;div class=&quot;result-actions&quot;&gt;
      &lt;div class=&quot;ra-btn ra-primary&quot; onclick=&quot;alert(&#x27;Generating PDF report...&#x27;)&quot;&gt;
        &lt;div class=&quot;rab-icon&quot;&gt;📄&lt;/div&gt;

        &lt;div class=&quot;rab-icon&quot;&gt;📅&lt;/div&gt;

      &lt;strong&gt;✦ AI-Generated Next Steps for Apex Auto Components&lt;/strong&gt;&lt;br&gt;
      Based on your responses, the highest-impact areas to address are: (1) &lt;strong&gt;Automated Payroll Processing&lt;/strong&gt; — currently manual, causing 15–20% error rate; (2) &lt;strong&gt;Real-Time PF/ESI Validation&lt;/strong&gt; — compliance risk due to delayed detection; (3) &lt;strong&gt;Geofenced Attendance&lt;/strong&gt; — buddy punching exposure at 3 plant locations. A BeeForce implementation can address all three in the first 90 days.

&lt;script&gt;
// ── Assessment data ──
const SECTIONS=[
  {name:&#x27;Vendor Management&#x27;,icon:&#x27;🏭&#x27;,questions:[
    {n:&#x27;Digital Vendor Onboarding&#x27;,d:&#x27;Reduces onboarding cycle time by 70–90%, eliminates manual paperwork and improves vendor compliance readiness.&#x27;},
    {n:&#x27;License Repository &amp; Expiry Tracking&#x27;,d:&#x27;Eliminates compliance gaps due to expired licenses and permits.&#x27;},

  ]},
  {name:&#x27;Workforce Onboarding&#x27;,icon:&#x27;👷&#x27;,questions:[
    {n:&#x27;Age Validation Controls&#x27;,d:&#x27;Prevents child labor compliance violations.&#x27;},
    {n:&#x27;Digital Approval Workflows&#x27;,d:&#x27;Standardised onboarding governance.&#x27;},
    {n:&#x27;Self-Service Digital Onboarding&#x27;,d:&#x27;Reduces onboarding effort by 80%.&#x27;},
  ]},
  {name:&#x27;Workforce Core Management&#x27;,icon:&#x27;⚙️&#x27;,questions:[
    {n:&#x27;Safety Compliance Monitoring&#x27;,d:&#x27;Strengthens EHS compliance across sites.&#x27;},
    {n:&#x27;Digital ID Card Management&#x27;,d:&#x27;Improved security and worker identification.&#x27;},
    {n:&#x27;Mandatory Training Tracking&#x27;,d:&#x27;Reduces workplace accidents.&#x27;},
  ]},
  {name:&#x27;Workforce Exit &amp; Offboarding&#x27;,icon:&#x27;🚪&#x27;,questions:[

    {n:&#x27;Structured Resignation Workflow&#x27;,d:&#x27;Standardised separation process.&#x27;},
    {n:&#x27;Digital Approval Workflow&#x27;,d:&#x27;Ensures governance and documentation.&#x27;},
  ]},
  {name:&#x27;Attendance &amp; Time Management&#x27;,icon:&#x27;⏰&#x27;,questions:[
    {n:&#x27;Exception Management&#x27;,d:&#x27;Reduced payroll disputes.&#x27;},
    {n:&#x27;Holiday &amp; Allowance Management&#x27;,d:&#x27;Accurate payroll calculations.&#x27;},
    {n:&#x27;Geofenced Attendance&#x27;,d:&#x27;Eliminates buddy punching.&#x27;},
  ]},
  {name:&#x27;Predictive Workforce Analytics&#x27;,icon:&#x27;📊&#x27;,questions:[
    {n:&#x27;Schedule Optimisation&#x27;,d:&#x27;Reduces overtime costs.&#x27;},
    {n:&#x27;AI-Based Demand Forecasting&#x27;,d:&#x27;Predicts workforce needs before shortages occur.&#x27;},
    {n:&#x27;Absenteeism Prediction&#x27;,d:&#x27;Improves workforce availability.&#x27;},
  ]},
  {name:&#x27;Payroll &amp; Payout Management&#x27;,icon:&#x27;💰&#x27;,questions:[
    {n:&#x27;Bonus &amp; Statutory Compliance Automation&#x27;,d:&#x27;Eliminates manual calculations.&#x27;},
    {n:&#x27;Automated Payroll Processing&#x27;,d:&#x27;Reduces payroll errors by 80%.&#x27;},
    {n:&#x27;Payroll Simulation Before Processing&#x27;,d:&#x27;Prevents payroll errors.&#x27;},
  ]},
  {name:&#x27;Compliance Management&#x27;,icon:&#x27;🛡️&#x27;,questions:[
    {n:&#x27;Real-Time PF Validation&#x27;,d:&#x27;Detects non-compliance immediately.&#x27;},
    {n:&#x27;Real-Time ESI Validation&#x27;,d:&#x27;Prevents compliance violations.&#x27;},
    {n:&#x27;Auto Statutory Register Generation&#x27;,d:&#x27;Reduces compliance effort.&#x27;},
  ]},
  {name:&#x27;Grievance Management&#x27;,icon:&#x27;📣&#x27;,questions:[
    {n:&#x27;Grievance Analytics&#x27;,d:&#x27;Identifies recurring workforce issues.&#x27;},
    {n:&#x27;Multi-channel Grievance Registration&#x27;,d:&#x27;Easy worker access.&#x27;},
    {n:&#x27;Voice-Based Grievance Capture&#x27;,d:&#x27;Supports low-literacy workforce.&#x27;},
  ]},
  {name:&#x27;Workforce Communication&#x27;,icon:&#x27;📢&#x27;,questions:[
    {n:&#x27;Policy &amp; Compliance Announcements&#x27;,d:&#x27;Better awareness.&#x27;},
    {n:&#x27;Targeted Workforce Broadcasting&#x27;,d:&#x27;Communicate with relevant workers instantly.&#x27;},
    {n:&#x27;Multi-language Communication&#x27;,d:&#x27;Higher workforce reach.&#x27;},
  ]},
];

const CHOICES=[&#x27;Not Available&#x27;,&#x27;Partially Available&#x27;,&#x27;Fully Available&#x27;];
const CHOICE_CLS=[&#x27;c-no&#x27;,&#x27;c-part&#x27;,&#x27;c-full&#x27;];
const answers={};
let totalQ=30;

function buildAssessment(){
  const cont=document.getElementById(&#x27;sections-container&#x27;);
  const sbSec=document.getElementById(&#x27;sb-sections&#x27;);
  cont.innerHTML=&#x27;&#x27;; sbSec.innerHTML=&#x27;&#x27;;

  SECTIONS.forEach((sec,si)=&gt;{
    // sidebar item
    const sbItem=document.createElement(&#x27;div&#x27;);
    sbItem.className=&#x27;sb-sec&#x27;;
    sbItem.id=`sb-sec-${si}`;
    sbItem.innerHTML=`&lt;div class=&quot;sb-sec-name&quot;&gt;${sec.icon} ${sec.name}&lt;/div&gt;&lt;div class=&quot;sb-sec-done&quot; id=&quot;sb-done-${si}&quot;&gt;0 / 3&lt;/div&gt;`;
    sbItem.onclick=()=&gt;document.getElementById(`sec-${si}`).scrollIntoView({behavior:&#x27;smooth&#x27;,block:&#x27;start&#x27;});
    sbSec.appendChild(sbItem);

    // main section
    const div=document.createElement(&#x27;div&#x27;);
    div.className=&#x27;assess-section&#x27;;
    div.id=`sec-${si}`;
    div.innerHTML=`
      &lt;div class=&quot;sec-header&quot;&gt;
        &lt;div class=&quot;sec-title&quot;&gt;${sec.icon} ${sec.name}&lt;/div&gt;
        &lt;div style=&quot;display:flex;align-items:center;gap:10px&quot;&gt;
          &lt;div class=&quot;sec-tag&quot;&gt;Framework section&lt;/div&gt;
          &lt;div class=&quot;sec-prog&quot; id=&quot;sec-prog-${si}&quot;&gt;0 / 3&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;`;

    sec.questions.forEach((q,qi)=&gt;{
      const qid=`${si}_${qi}`;
      const row=document.createElement(&#x27;div&#x27;);
      row.className=&#x27;q-row&#x27;;
      row.innerHTML=`
        &lt;div class=&quot;q-left&quot;&gt;
          &lt;div class=&quot;q-name&quot;&gt;${q.n}&lt;/div&gt;
          &lt;div class=&quot;q-desc&quot;&gt;${q.d}&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;q-choices&quot; id=&quot;choices-${qid}&quot;&gt;
          ${CHOICES.map((c,ci)=&gt;`&lt;button class=&quot;choice-btn ${CHOICE_CLS[ci]}&quot; onclick=&quot;choose(&#x27;${qid}&#x27;,${ci},this)&quot;&gt;${c}&lt;/button&gt;`).join(&#x27;&#x27;)}
        &lt;/div&gt;`;
      div.appendChild(row);
    });
    cont.appendChild(div);
  });
}

function choose(qid,ci,btn){
  answers[qid]=ci;
  const choicesDiv=document.getElementById(`choices-${qid}`);
  choicesDiv.querySelectorAll(&#x27;.choice-btn&#x27;).forEach((b,i)=&gt;{
    b.classList.toggle(&#x27;sel&#x27;,i===ci);
  });
  updateProgress();
}

function updateProgress(){
  const answered=Object.keys(answers).length;
  const pct=Math.round(answered/totalQ*100);

  // top bar
  document.getElementById(&#x27;prog-label&#x27;).textContent=pct+&#x27;% complete&#x27;;
  document.getElementById(&#x27;main-prog-bar&#x27;).style.width=pct+&#x27;%&#x27;;

  // sidebar
  document.getElementById(&#x27;sb-answered&#x27;).textContent=answered+&#x27; answered&#x27;;
  document.getElementById(&#x27;sb-fill&#x27;).style.width=pct+&#x27;%&#x27;;

  // footer
  document.getElementById(&#x27;foot-answered&#x27;).textContent=answered;
  const warn=document.getElementById(&#x27;foot-warn&#x27;);
  const submit=document.getElementById(&#x27;btn-submit&#x27;);
  if(pct&gt;=70){warn.textContent=&#x27;Ready to submit!&#x27;;warn.style.color=&#x27;#16a34a&#x27;;submit.classList.add(&#x27;ready&#x27;);}
  else{warn.textContent=&#x27;Minimum 70% required to submit&#x27;;warn.style.color=&#x27;#f59e0b&#x27;;submit.classList.remove(&#x27;ready&#x27;);}

  // per-section
  SECTIONS.forEach((sec,si)=&gt;{
    let done=0;
    sec.questions.forEach((_,qi)=&gt;{if(answers[`${si}_${qi}`]!==undefined)done++;});
    document.getElementById(`sec-prog-${si}`).textContent=done+&#x27; / 3&#x27;;
    document.getElementById(`sb-done-${si}`).textContent=done+&#x27; / 3&#x27;;
    const sbEl=document.getElementById(`sb-sec-${si}`);
    sbEl.classList.toggle(&#x27;all-done&#x27;,done===3);
    const check=sbEl.querySelector(&#x27;.sb-check&#x27;);
    if(!check){const c=document.createElement(&#x27;div&#x27;);c.className=&#x27;sb-check&#x27;;if(done===3)c.innerHTML=&#x27;✓&#x27;;sbEl.appendChild(c);}
    else{check.innerHTML=done===3?&#x27;✓&#x27;:&#x27;&#x27;;sbEl.querySelector(&#x27;.sb-check&#x27;).classList.toggle(&#x27;all-done&#x27;,done===3);}
  });
}

// ── Results ──
function buildResults(){
  // Score based on choices (Fully=100, Partial=50, No=0)
  let total=0; const keys=Object.keys(answers);
  keys.forEach(k=&gt;{total+=answers[k]===2?100:answers[k]===1?50:0;});
  const score=keys.length&gt;0?Math.round(total/totalQ):42;
  const displayScore=Math.max(score,38); // demo floor

  document.getElementById(&#x27;res-score&#x27;).textContent=displayScore+&#x27; / 100&#x27;;
  document.getElementById(&#x27;ring-num&#x27;).textContent=displayScore+&#x27;%&#x27;;

  // Animate ring
  const circ=document.getElementById(&#x27;ring-circle&#x27;);
  const circumf=2*Math.PI*45;
  setTimeout(()=&gt;{circ.style.strokeDashoffset=circumf-(circumf*displayScore/100);},200);

  // Section scores
  const bars=document.getElementById(&#x27;section-score-bars&#x27;);
  bars.innerHTML=&#x27;&#x27;;
  SECTIONS.forEach((sec,si)=&gt;{
    let sTotal=0;
    sec.questions.forEach((_,qi)=&gt;{const v=answers[`${si}_${qi}`];sTotal+=v===2?100:v===1?50:0;});
    const sPct=keys.length&gt;0?Math.round(sTotal/3):Math.floor(20+Math.random()*60);
    const color=sPct&gt;=70?&#x27;#16a34a&#x27;:sPct&gt;=40?&#x27;#f59e0b&#x27;:&#x27;#ef4444&#x27;;
    bars.innerHTML+=`
      &lt;div class=&quot;ss-row&quot;&gt;
        &lt;div class=&quot;ss-name&quot;&gt;${sec.icon} ${sec.name}&lt;/div&gt;
        &lt;div class=&quot;ss-bar-wrap&quot;&gt;&lt;div class=&quot;ss-bar&quot; style=&quot;width:${sPct}%;background:${color}&quot; id=&quot;sbar-${si}&quot;&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;ss-pct&quot; style=&quot;color:${color}&quot;&gt;${sPct}%&lt;/div&gt;
      &lt;/div&gt;`;
  });
}

// ── View navigation ──
function showView(id){
  document.querySelectorAll(&#x27;.view&#x27;).forEach(v=&gt;v.classList.remove(&#x27;active&#x27;));
  document.querySelectorAll(&#x27;.nd-btn&#x27;).forEach(b=&gt;b.classList.remove(&#x27;active&#x27;));
  document.getElementById(id).classList.add(&#x27;active&#x27;);
  document.querySelector(`.nd-btn[onclick=&quot;showView(&#x27;${id}&#x27;)&quot;]`).classList.add(&#x27;active&#x27;);
  window.scrollTo(0,0);
  if(id===&#x27;v-results&#x27;) buildResults();
}

// ── Admin type selector ──
function selType(el){document.querySelectorAll(&#x27;.tc&#x27;).forEach(e=&gt;e.classList.remove(&#x27;sel&#x27;));el.classList.add(&#x27;sel&#x27;);}
function selAssType(el,type){
  document.querySelectorAll(&#x27;.ast-btn&#x27;).forEach(e=&gt;e.classList.remove(&#x27;sel&#x27;));
  el.classList.add(&#x27;sel&#x27;);
  const counts={minimal:10,standard:30,detailed:50};
  document.getElementById(&#x27;qs-count&#x27;).textContent=counts[type];
  totalQ=counts[type];
}

// ── FOMO timer ──
let secs=47*3600+23*60+8;
function tick(){
  secs--;if(secs&lt;0)secs=0;
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
  document.getElementById(&#x27;timer&#x27;).textContent=
    String(h).padStart(2,&#x27;0&#x27;)+&#x27;:&#x27;+String(m).padStart(2,&#x27;0&#x27;)+&#x27;:&#x27;+String(s).padStart(2,&#x27;0&#x27;);
}
setInterval(tick,1000);

// ── Build on load ──
buildAssessment();

// Sidebar check marks (add to each)
document.querySelectorAll(&#x27;.sb-sec&#x27;).forEach(el=&gt;{
  if(!el.querySelector(&#x27;.sb-check&#x27;)){const c=document.createElement(&#x27;div&#x27;);c.className=&#x27;sb-check&#x27;;el.appendChild(c);}
});
&lt;/script&gt;
